# Cilium is already running (installed by cloud-init at node boot). This
# Application takes over as the source of truth going forward — same chart
# version and values deploy.sh already used, so the first sync should be a
# no-op upgrade, not a CNI restart. Do NOT delete/prune-test this one casually:
# pruning Cilium = losing the CNI = losing the cluster network.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-infra
  sources:
    - repoURL: https://helm.cilium.io/
      chart: cilium
      targetRevision: "1.16.0"
      helm:
        releaseName: cilium
        valueFiles:
          - $values/k8s/helm/cilium-values.yaml
    - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false      # never let an auto-prune rip out the CNI
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: monitoring.coreos.com
      kind: ServiceMonitor
      name: cilium-agent
      jsonPointers:
        - /spec/endpoints/0/relabelings
    - group: monitoring.coreos.com
      kind: ServiceMonitor
      name: hubble
      jsonPointers:
        - /spec/endpoints/0/relabelings