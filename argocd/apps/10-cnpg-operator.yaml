# CloudNativePG operator. Provides the 'Cluster' and 'Pooler' CRDs that the
# postgresql chart (wave 20) depends on. Release name kept as 'cnpg' to
# match deploy.sh.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-infra
  sources:
    - repoURL: https://cloudnative-pg.github.io/charts
      chart: cloudnative-pg
      targetRevision: "0.28.3"   # see argocd/bootstrap/capture-versions.sh
      helm:
        releaseName: cnpg
        valueFiles:
          - $values/platform/upstream-values/cnpg-values.yaml
    - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
