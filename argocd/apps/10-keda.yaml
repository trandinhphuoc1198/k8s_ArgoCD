# Provides the ScaledObject CRD that fastapi-app's scaledobject.yaml
# (wave 40) depends on.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-infra
  sources:
    - repoURL: https://kedacore.github.io/charts
      chart: keda
      targetRevision: "REPLACE_ME"   # see argocd/bootstrap/capture-versions.sh
      helm:
        releaseName: keda
        valueFiles:
          - $values/k8s/helm/keda-values.yaml
    - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
