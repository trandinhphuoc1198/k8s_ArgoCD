# Custom local chart (charts/fastapi-app). Last wave — depends on:
#   - ingress-nginx (wave 10) for its Ingress
#   - keda (wave 10) for the ScaledObject CRD
#   - otel-collectors (wave 20) for the Instrumentation CR it annotates onto
#   - postgresql (wave 20) for the pg-pooler-rw/ro Services it connects to
#   - prometheus-operator-crds (wave 0) for the ServiceMonitor it creates
#
# NOTE: charts/fastapi-app/values.yaml ships a placeholder DB password
# ("changeme") committed in git, same caveat as the postgresql chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "40"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-apps
  source:
    repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
    targetRevision: main
    path: charts/fastapi-app
    helm:
      releaseName: fastapi-app
  destination:
    server: https://kubernetes.default.svc
    namespace: fastapi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
