apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-autoscaler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "00"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-infra
  sources:
    - repoURL: https://kubernetes.github.io/autoscaler
      chart: cluster-autoscaler
      targetRevision: "9.37.0"
      helm:
        releaseName: cluster-autoscaler
        valueFiles:
          - $values/platform/upstream-values/auto-scaler-values.yaml
    - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
