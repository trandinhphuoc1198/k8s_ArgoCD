apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cert-manager
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            role: spoke
  template:
    metadata:
      name: 'cert-manager-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "01"
    spec:
      project: platform-infra
      sources:
        - repoURL: https://charts.jetstack.io
          chart: cert-manager
          targetRevision: "1.15.0"
          helm:
            releaseName: cert-manager
            values: |
              crds:
                enabled: true
                keep: true
      destination:
        server: '{{server}}'
        namespace: cert-manager
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true