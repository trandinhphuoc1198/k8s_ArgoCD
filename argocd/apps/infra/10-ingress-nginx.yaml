apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            role: spoke
  template:
    metadata:
      name: 'ingress-nginx-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "10"
    spec:
      project: platform-infra
      sources:
        - repoURL: https://kubernetes.github.io/ingress-nginx
          chart: ingress-nginx
          targetRevision: "4.15.1"   # see argocd/bootstrap/capture-versions.sh
          helm:
            releaseName: ingress-nginx
            valueFiles:
              - $values/platform/upstream-values/ingress-nginx-values.yaml
        - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
          targetRevision: main
          ref: values
      destination:
        server: '{{server}}'
        namespace: ingress-nginx
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
