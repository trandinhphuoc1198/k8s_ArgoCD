# Custom local chart (charts/otel). Depends on the OTel Operator CRDs
# (wave 10): OpenTelemetryCollector + Instrumentation.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: otel-collectors
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            role: spoke
  template:
    metadata:
      name: 'otel-collectors-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "20"
    spec:
      project: platform-infra
      source:
        repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
        targetRevision: main
        path: platform/charts/otel
        helm:
          releaseName: otel
      destination:
        server: '{{server}}'
        namespace: observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
