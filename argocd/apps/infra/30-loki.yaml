# Uses the 'grafana-community' fork repo, same as deploy.sh — this is NOT
# the official grafana/loki chart.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: loki
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            role: spoke
  template:
    metadata:
      name: 'loki-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "30"
    spec:
      project: platform-infra
      sources:
        - repoURL: https://grafana-community.github.io/helm-charts
          chart: loki
          targetRevision: "12.0.0"
          helm:
            releaseName: loki
            valueFiles:
              - $values/platform/upstream-values/loki-values.yaml
        - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
          targetRevision: main
          ref: values
      destination:
        server: '{{server}}'
        namespace: observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
