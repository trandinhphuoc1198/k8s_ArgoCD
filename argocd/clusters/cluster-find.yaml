# argocd/clusters/clusters-find.yaml
#
# Single ExternalSecret that discovers EVERY spoke registered under the
# "argocd-clusters/" prefix in AWS Secrets Manager and materializes one
# argocd-namespace cluster Secret per match. Onboarding a new spoke is
# purely an AWS-side operation (create/put-secret-value under that prefix)
# — no git commit is needed to register a cluster.
#
# Expected shape of each Secrets Manager entry, e.g. key
# "argocd-clusters/spoke-dev":
#   {
#     "name":   "spoke-dev",
#     "server": "https://<spoke-api-server>:6443",
#     "token":  "<ServiceAccount bearer token on that spoke>",
#     "caData": "<base64-encoded CA cert of that spoke's API server>"
#   }
# See bootstrap/README.md for how to populate this per spoke.
#
# dataFrom.find matches every key under the given path/regexp and creates
# one target Secret per match (named after the matched key by default).
# The template below is applied uniformly to each generated Secret, so
# every matched spoke gets the same label set and the same
# {name, server, config} shape that ArgoCD's cluster list expects.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-spoke-clusters
  namespace: argocd
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: argocd-clusters-store
    kind: ClusterSecretStore
  target:
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: cluster
          role: spoke
      data:
        name: "{{ .name }}"
        server: "{{ .server }}"
        config: |
          {"bearerToken":"{{ .token }}","tlsClientConfig":{"insecure":false,"caData":"{{ .caData }}"}}
  dataFrom:
    - find:
        path: argocd-clusters/
        name:
          regexp: "^argocd-clusters/.*"
