# argocd/clusters/spoke-dev.yaml
#
# Registers a spoke cluster with ArgoCD. ESO watches AWS Secrets Manager
# key "argocd-clusters/spoke-dev" (populated by register-with-hub.sh.tpl,
# which now pushes {name, role, server, token, caData}) and materializes it
# into the argocd-namespace Secret that ArgoCD's cluster list reads.
#
# Both "cluster-name" and "cluster-role" labels are templated straight from
# the pushed secret's fields, so they can never drift from what the spoke
# actually registered as. "cluster-role" is what every ApplicationSet's
# cluster generator selector matches on (spokes/** selects cluster-role:
# workload); "cluster-name" is what argocd-register-spoke.yml now queries
# directly to confirm a specific spoke registered successfully.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: spoke-dev
  namespace: argocd
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: argocd-clusters-store
    kind: ClusterSecretStore
  target:
    name: spoke-dev
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: cluster
          cluster-name: "{{ .name }}"
          cluster-role: "{{ .role }}"
      data:
        name: "{{ .name }}"
        server: "{{ .server }}"
        config: |
          {"bearerToken":"{{ .token }}","tlsClientConfig":{"insecure":false,"caData":"{{ .caData }}"}}
  dataFrom:
    - extract:
        key: argocd-clusters/spoke-dev-k8s
