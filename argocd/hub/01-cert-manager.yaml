# cert-manager for the hub cluster. Needed so the ArgoCD server Ingress
# (argocd/hub/00-argocd.yaml + platform/upstream-values/argocd-values.yaml,
# annotation cert-manager.io/cluster-issuer: internal-ca-issuer) can get a
# TLS cert once ingress-nginx (04-ingress-nginx.yaml) is also up.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "01"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-hub
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: "1.15.0"
    helm:
      releaseName: cert-manager
      values: |
        crds:
          enabled: true
          keep: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true