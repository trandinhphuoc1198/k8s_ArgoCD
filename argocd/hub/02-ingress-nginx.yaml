# nginx ingress controller for the hub cluster — required for ArgoCD's
# server Ingress to actually route traffic. NodePorts match live/hub's
# ALB target group (https_nodeport = 30443).
#
# base + overlay: platform/values/base/ingress-nginx.yaml holds the config
# shared by every tier (see that file for the OTel-on-hub caveat);
# platform/values/hub/ingress-nginx.yaml is this tier's override (empty
# today). Never reference another tier's directory directly — see
# argocd/README.md#hub-vs-spoke-values.
#
# (Renamed from 02-ingress-nginx.yaml.yaml — fixed the duplicated extension.)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "02"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-hub
  sources:
    - repoURL: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      targetRevision: "4.15.1"
      helm:
        releaseName: ingress-nginx
        valueFiles:
          - $values/platform/values/base/ingress-nginx.yaml
          - $values/platform/values/hub/ingress-nginx.yaml
    - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
