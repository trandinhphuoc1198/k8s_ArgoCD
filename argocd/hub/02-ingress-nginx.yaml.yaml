# nginx ingress controller for the hub cluster — required for ArgoCD's
# server Ingress to actually route traffic. NodePorts match live/hub's
# ALB target group (https_nodeport = 30443).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "02"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-hub
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: "4.15.1"
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          replicaCount: 1
          service:
            type: NodePort
            nodePorts:
              http: 30080
              https: 30443
          config:
            server-snippet: |
              location /alb-health {
                access_log off;
                return 200 "ok";
                add_header Content-Type text/plain;
              }
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 128Mi
        defaultBackend:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true