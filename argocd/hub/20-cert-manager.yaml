# Wave 20 — depends on Cilium's pod networking (wave "10") and the Gateway
# API CRDs (wave "00", since config.enableGatewayAPI: true in
# platform/values/base/cert-manager.yaml makes the chart install
# Gateway-API-aware RBAC/watches at startup).
#
# Needed so the ArgoCD server's HTTPRoute
# (platform/gateway-routes/hub/argocd-httproute.yaml, wave "40") can get a
# TLS cert once 30-gateway.yaml is also up.
#
# base + overlay: platform/values/base/cert-manager.yaml holds the config
# shared by every tier; platform/values/hub/cert-manager.yaml is this
# tier's override (empty today). Never reference another tier's directory
# directly — see argocd/README.md#hub-vs-spoke-values.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-hub
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: "1.15.0"
      helm:
        releaseName: cert-manager
        valueFiles:
          - $values/platform/values/base/cert-manager.yaml
          - $values/platform/values/hub/cert-manager.yaml
    - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
