# New addition — cluster-autoscaler was not previously installed on the hub
# (Terraform only installed Cilium + CCM there). This is a fresh install,
# not an adoption — safe to sync from the start, no live-state diffing
# needed first (unlike 00-cilium.yaml / 00-aws-ccm.yaml).
#
# base + overlay: platform/values/base/auto-scaler.yaml holds config shared
# by every tier; platform/values/hub/auto-scaler.yaml is this tier's
# override (autoDiscovery.clusterName, awsRegion). See
# argocd/README.md#hub-vs-spoke-values.
#
# Sync-wave 01: needs Cilium's pod networking (wave 00) up first.
#
# Confirm the hub actually sits behind an ASG before syncing this — if it's
# a fixed single control-plane node, this chart has nothing to discover.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-autoscaler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-hub
  sources:
    - repoURL: https://kubernetes.github.io/autoscaler
      chart: cluster-autoscaler
      targetRevision: "9.37.0"
      helm:
        releaseName: cluster-autoscaler
        valueFiles:
          - $values/platform/values/base/auto-scaler.yaml
          - $values/platform/values/hub/auto-scaler.yaml
    - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true