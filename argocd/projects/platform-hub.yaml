apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-hub
  namespace: argocd
spec:
  description: >
    The hub cluster's own management plane: ArgoCD's Helm release, External
    Secrets Operator, the ClusterSecretStore, the per-spoke ExternalSecrets
    that register spoke clusters, and the node-level infra (Cilium, AWS
    CCM, cluster-autoscaler)
  sourceRepos:
    - "https://argoproj.github.io/argo-helm"
    - "https://charts.external-secrets.io"
    - "https://charts.jetstack.io"
    - "https://kubernetes.github.io/ingress-nginx"
    - "https://helm.cilium.io/"
    - "https://kubernetes.github.io/cloud-provider-aws"
    - "https://kubernetes.github.io/autoscaler"
    - "https://github.com/trandinhphuoc1198/k8s_ArgoCD.git"

  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: ingress-nginx
    - server: https://kubernetes.default.svc
      namespace: kube-system

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"