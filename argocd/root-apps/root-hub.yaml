# root-apps/root-hub.yaml
#
# App-of-apps for everything that runs ONLY on the hub cluster (where ArgoCD
# itself lives): ArgoCD's own Helm release, External Secrets Operator, the
# ClusterSecretStore, and per-spoke ExternalSecrets that register spoke
# clusters with ArgoCD.
#
# Apply once, by hand, alongside root-spokes.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-hub
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-hub
  source:
    repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
    targetRevision: main
    path: argocd/hub
    directory:
      recurse: true
      exclude: "external-secrets-config/*"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
