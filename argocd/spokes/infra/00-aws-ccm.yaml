apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: aws-cloud-controller-manager
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-role: workload
  template:
    metadata:
      name: 'aws-cloud-controller-manager-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "00"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: platform-infra
      sources:
        - repoURL: https://kubernetes.github.io/cloud-provider-aws
          chart: aws-cloud-controller-manager
          targetRevision: "0.0.11"
          helm:
            valueFiles:
              - $values/platform/upstream-values/aws-ccm-values.yaml
        - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
          targetRevision: main
          ref: values
      destination:
        server: '{{server}}'
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
