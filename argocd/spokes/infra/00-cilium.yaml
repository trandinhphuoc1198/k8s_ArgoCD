# Cilium is already running on each spoke (installed by cloud-init at node
# boot). This ApplicationSet takes over as the source of truth going
# forward — same chart version and values deploy.sh already used, so the
# first sync per spoke should be a no-op upgrade, not a CNI restart.
# Do NOT flip prune to true on this one: pruning Cilium = losing the CNI =
# losing that spoke's network.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cilium
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            role: workload
  template:
    metadata:
      name: 'cilium-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "00"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: platform-infra
      sources:
        - repoURL: https://helm.cilium.io/
          chart: cilium
          targetRevision: "1.16.0"
          helm:
            releaseName: cilium
            valueFiles:
              - $values/platform/upstream-values/cilium-values.yaml
        - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
          targetRevision: main
          ref: values
      destination:
        server: '{{server}}'
        namespace: kube-system
      syncPolicy:
        automated:
          prune: false      # never let an auto-prune rip out the CNI
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
