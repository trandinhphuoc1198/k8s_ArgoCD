# base + overlay: platform/values/base/auto-scaler.yaml holds config shared
# by every tier; platform/values/spoke/auto-scaler.yaml is this tier's
# override (autoDiscovery.clusterName, awsRegion). See
# argocd/README.md#hub-vs-spoke-values.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-autoscaler
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-role: workload
  template:
    metadata:
      name: 'cluster-autoscaler-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "01"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: platform-infra
      sources:
        - repoURL: https://kubernetes.github.io/autoscaler
          chart: cluster-autoscaler
          targetRevision: "9.37.0"
          helm:
            releaseName: cluster-autoscaler
            valueFiles:
              - $values/platform/values/base/auto-scaler.yaml
              - $values/platform/values/spoke/auto-scaler.yaml
        - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
          targetRevision: main
          ref: values
      destination:
        server: '{{server}}'
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true