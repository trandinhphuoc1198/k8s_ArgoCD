# Provides the ScaledObject CRD that fastapi-app's scaledobject.yaml
# (wave 50) depends on.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: keda
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-role: workload
  template:
    metadata:
      name: 'keda-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "10"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: platform-infra
      sources:
        - repoURL: https://kedacore.github.io/charts
          chart: keda
          targetRevision: "2.20.1"
          helm:
            releaseName: keda
            valueFiles:
              - $values/platform/upstream-values/keda-values.yaml
        - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
          targetRevision: main
          ref: values
      destination:
        server: '{{server}}'
        namespace: keda
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
