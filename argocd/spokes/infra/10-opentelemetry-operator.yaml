# Provides the OpenTelemetryCollector and Instrumentation CRDs that the
# otel-collectors workload (wave 20) and fastapi-app's auto-instrumentation
# annotation (wave 50) depend on.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: opentelemetry-operator
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-role: workload
  template:
    metadata:
      name: 'opentelemetry-operator-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "10"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: platform-infra
      sources:
        - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
          chart: opentelemetry-operator
          targetRevision: "0.114.1"
          helm:
            releaseName: opentelemetry-operator
            valueFiles:
              - $values/platform/upstream-values/otel-operator-values.yaml
        - repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
          targetRevision: main
          ref: values
      destination:
        server: '{{server}}'
        namespace: observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
