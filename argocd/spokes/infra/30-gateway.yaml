# Wave 30 — deploys the shared spoke Cilium Gateway
# (platform/gateway-api/spoke-gateway.yaml). Needs cert-manager's
# CRDs/webhook (20-cert-manager.yaml, wave "20") to issue the per-listener
# TLS certs, and Cilium's Gateway API controller + CRDs
# (10-cilium.yaml wave "10", 00-gateway-api-crds.yaml wave "00"). Doesn't
# need kube-prometheus-stack — co-located in this wave purely because both
# only depend on wave "20" being done.
#
# Replaces the old ingress-nginx ApplicationSet at this same position in
# the dependency chain.
#
# include: only picks up spoke-gateway.yaml from the shared
# platform/gateway-api/ directory — hub-gateway.yaml is applied separately
# by argocd/hub/30-gateway.yaml.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: gateway
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-role: workload
  template:
    metadata:
      name: 'gateway-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "30"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: platform-infra
      source:
        repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
        targetRevision: main
        path: platform/gateway-api
        directory:
          include: "spoke-gateway.yaml"
      destination:
        server: '{{server}}'
        namespace: gateway-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
