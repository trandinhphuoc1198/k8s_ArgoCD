# Wave 40 — plain ConfigMaps (not a Helm chart) — Grafana's sidecar in
# kube-prometheus-stack picks them up via the grafana_dashboard=1 label.
# Needs the monitoring namespace + Grafana sidecar from kube-prometheus-stack
# (wave "30") on that spoke.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: grafana-dashboards
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-role: workload
  template:
    metadata:
      name: 'grafana-dashboards-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "40"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: platform-infra
      source:
        repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
        targetRevision: main
        path: platform/grafana-dashboards
        directory:
          recurse: false
          exclude: "*.md"
      destination:
        server: '{{server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
