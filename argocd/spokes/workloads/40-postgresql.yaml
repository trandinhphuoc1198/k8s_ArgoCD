# Custom local chart (services/postgresql) — creates the CNPG 'Cluster' +
# poolers. Depends on the CNPG operator's CRDs (wave 10) on that spoke.
#
# NOTE: services/postgresql/values.yaml ships a placeholder app-user
# password ("changeme", base64-encoded) committed in git. That's a
# pre-existing condition in this repo, not something this ApplicationSet
# introduces — but now that it's the live source of truth for every spoke,
# consider moving it to a sealed-secret / external-secret before going
# further than a dev environment.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: postgresql
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            role: workload
  template:
    metadata:
      name: 'postgresql-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "40"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: platform-apps
      source:
        repoURL: https://github.com/trandinhphuoc1198/k8s_ArgoCD.git
        targetRevision: main
        path: services/postgresql
        helm:
          releaseName: postgresql
      destination:
        server: '{{server}}'
        namespace: db
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
