replicaCount: 1

image:
  repository: gintaku98/k8s_fastapi
  tag: daf0612adf9b6220949abfc84a182b77c2534572
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

containerPort: 8000

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/x-forwarded-prefix: "/fastapi-app"
  hosts:
    - host: ""
      paths:
        - path: /fastapi-app(/|$)(.*)
          pathType: ImplementationSpecific
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 126Mi
  limits:
    cpu: 200m
    memory: 256Mi

keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 5

  # How often KEDA queries Prometheus (seconds)
  pollingInterval: 30
  # How long to wait after last trigger fires before scaling in (seconds)
  cooldownPeriod: 60

  prometheus:
    # In-cluster Prometheus exposed by kube-prometheus-stack
    serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090

  # ── Scale-out / scale-in behaviour ─────────────────────────────────────────
  scaleUp:
    stabilizationWindowSeconds: 30   # react within 1 m of sustained load
    maxPodsPerStep: 2                 # add at most 2 pods per step
    periodSeconds: 60
  scaleDown:
    stabilizationWindowSeconds: 30  # wait 5 m of low load before removing pods
    maxPodsPerStep: 2                 # remove 1 pod at a time
    periodSeconds: 60

  # ── Trigger thresholds ──────────────────────────────────────────────────────
  triggers:
    # Scale out when per-pod RPS exceeds this value
    requestRate:
      threshold: "10"

    # Scale out when per-pod active (in-flight) requests exceed this value
    activeRequests:
      threshold: "10"

    # Scale out when P95 latency (seconds) exceeds this value
    p95Latency:
      threshold: "0.5"

database:
  createSecret: true
  existingSecret: ""
  secretName: ""
  writehost: "pg-pooler-rw.db.svc.cluster.local"
  readhost: "pg-pooler-ro.db.svc.cluster.local"
  port: "5432"
  user: "appuser"
  password: "changeme"
  name: "appdb"

podAnnotations: {}
podLabels: {}

serviceAccount:
  create: false
  annotations: {}
  name: ""

nodeSelector: {}
tolerations: []
affinity: {}

probes:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  additionalLabels:
    release: kube-prometheus-stack


# ─────────────────────────────────────────────────────────────────────────────
# OpenTelemetry auto-instrumentation
#
# When enabled: true, the pod gets a single annotation that tells the OTel
# Operator webhook to inject the Python SDK init-container at admission time.
# The operator then sets ALL OTEL_* env vars automatically from the
# Instrumentation CR defined in charts/otel — nothing else is needed here.
#
# Prerequisites:
#   - OTel Operator installed  (k8s/helm/otel-operator-values.yaml)
#   - OTel chart deployed      (charts/otel/, namespace: observability)
# ─────────────────────────────────────────────────────────────────────────────
opentelemetry:
  # Master switch — set false to disable injection with no other changes needed.
  enabled: true

  # Namespace where the Instrumentation CR lives.
  # Becomes the prefix in the annotation: "<instrumentationNamespace>/fastapi-instrumentation"
  # Must match global.namespace in charts/otel/values.yaml.
  instrumentationNamespace: "observability"