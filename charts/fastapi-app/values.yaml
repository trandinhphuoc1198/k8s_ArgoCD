replicaCount: 2

image:
  repository: gintaku98/k8s_fastapi
  tag: 17122fa00c387d9623d5f7f6f5b9921d9f02a14b
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

containerPort: 8000

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/x-forwarded-prefix: "/fastapi-app"
  hosts:
    - host: ""
      paths:
        - path: /fastapi-app(/|$)(.*)
          pathType: ImplementationSpecific
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 126Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

database:
  createSecret: true
  existingSecret: ""
  secretName: ""
  host: "postgres.default.svc.cluster.local"
  port: "5432"
  user: "app_user"
  password: "change-me"
  name: "app_db"

podAnnotations: {}
podLabels: {}

serviceAccount:
  create: false
  annotations: {}
  name: ""

nodeSelector: {}
tolerations: []
affinity: {}

probes:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  additionalLabels:
    release: kube-prometheus-stack


# ─────────────────────────────────────────────────────────────────────────────
# OpenTelemetry auto-instrumentation
#
# When enabled: true, the pod gets a single annotation that tells the OTel
# Operator webhook to inject the Python SDK init-container at admission time.
# The operator then sets ALL OTEL_* env vars automatically from the
# Instrumentation CR defined in charts/otel — nothing else is needed here.
#
# Prerequisites:
#   - OTel Operator installed  (k8s/helm/otel-operator-values.yaml)
#   - OTel chart deployed      (charts/otel/, namespace: observability)
# ─────────────────────────────────────────────────────────────────────────────
opentelemetry:
  # Master switch — set false to disable injection with no other changes needed.
  enabled: true

  # Namespace where the Instrumentation CR lives.
  # Becomes the prefix in the annotation: "<instrumentationNamespace>/fastapi-instrumentation"
  # Must match global.namespace in charts/otel/values.yaml.
  instrumentationNamespace: "observability"