replicaCount: 2

image:
  repository: gintaku98/k8s_fastapi
  tag: 95c2855b3c14a70bd2d5f1280d2b8414ae3e4c01
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

containerPort: 8000

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/x-forwarded-prefix: "/fastapi-app"
  hosts:
    - host: ""
      paths:
        - path: /fastapi-app(/|$)(.*)
          pathType: ImplementationSpecific
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 126Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

database:
  createSecret: true
  existingSecret: ""
  secretName: ""
  host: "postgres.default.svc.cluster.local"
  port: "5432"
  user: "app_user"
  password: "change-me"
  name: "app_db"

podAnnotations: {}
podLabels: {}

serviceAccount:
  create: false
  annotations: {}
  name: ""

nodeSelector: {}
tolerations: []
affinity: {}

probes:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  additionalLabels:
    release: kube-prometheus-stack

# ─────────────────────────────────────────────────────────────────────────────
# OpenTelemetry auto-instrumentation
#
# When enabled: true the deployment gains two things:
#   1. Pod annotations that tell the OTel Operator webhook to inject the
#      Python SDK init-container (no changes to your app image required).
#   2. A set of OTEL_* env vars so the SDK knows where to export and what
#      to call itself.
#
# Prerequisites:
#   - OTel Operator installed in the cluster  (see k8s/helm/otel-operator-values.yaml)
#   - OTel chart deployed in the observability namespace  (charts/otel/)
# ─────────────────────────────────────────────────────────────────────────────
opentelemetry:
  # Master switch — set false to remove all OTel injection with zero diff elsewhere
  enabled: true

  # Namespace where the Instrumentation CR lives (charts/otel is deployed here).
  # The annotation value becomes "<instrumentationNamespace>/fastapi-instrumentation".
  # If left empty it defaults to .Release.Namespace (usually fine for same-ns deploys).
  instrumentationNamespace: "observability"

  # Value written to the deployment.environment resource attribute on every span.
  # Override per environment: --set opentelemetry.environment=staging
  environment: "production"