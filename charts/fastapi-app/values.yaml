replicaCount: 2

image:
  repository: gintaku98/k8s_fastapi
  tag: 95c2855b3c14a70bd2d5f1280d2b8414ae3e4c01
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

containerPort: 8000

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  annotations: 
    # FIX 1: Proper regex capture. This grabs whatever is AFTER /fastapi-app 
    # and pastes it into the $2 variable in the rewrite-target.
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # FIX 2: Passes a header so FastAPI knows it's behind a subpath proxy
    nginx.ingress.kubernetes.io/x-forwarded-prefix: "/fastapi-app"
  hosts:
    - host: ""
      paths:
        # FIX 3: Regex path to capture the end of the URL (stored in $2)
        - path: /fastapi-app(/|$)(.*)
          pathType: ImplementationSpecific # Required for regex paths in NGINX
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 126Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

database:
  createSecret: true
  existingSecret: ""
  secretName: ""
  host: "postgres.default.svc.cluster.local"
  port: "5432"
  user: "app_user"
  password: "change-me"
  name: "app_db"

podAnnotations: {}
podLabels: {}

serviceAccount:
  create: false
  annotations: {}
  name: ""

nodeSelector: {}
tolerations: []
affinity: {}

probes:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  additionalLabels:
    release: kube-prometheus-stack

# FIX 4: Explicitly pass ROOT_PATH to the FastAPI container
extraEnv: 
  - name: ROOT_PATH
    value: "/fastapi-app"