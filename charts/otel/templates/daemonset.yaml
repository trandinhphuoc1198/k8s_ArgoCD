# charts/otel/templates/collector-daemonset.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Node-level DaemonSet Collector
#
# Receives OTLP/gRPC and OTLP/HTTP from every pod on the node.
# Also tails container log files from the node filesystem (filelog receiver),
# parses JSON logs, and correlates them with traces via trace_id / span_id.
#
# The traceID-based load balancing is REQUIRED when the aggregator runs as a
# multi-replica Deployment with tail_sampling: all spans of a trace must land
# on the same aggregator replica so the sampler can evaluate the full trace.
# ─────────────────────────────────────────────────────────────────────────────
{{- if .Values.collectorDaemonSet.enabled }}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ include "otel.collectorDS.name" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "otel.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector-daemonset
spec:
  mode: daemonset
  serviceAccount: otel-collector

  resources:
    {{- toYaml .Values.collectorDaemonSet.resources | nindent 4 }}

  hostNetwork: false
  ports:
    - name: otlp-grpc
      port: {{ .Values.collectorDaemonSet.ports.otlpGrpc }}
      protocol: TCP
      hostPort: {{ .Values.collectorDaemonSet.ports.otlpGrpc }}
    - name: otlp-http
      port: {{ .Values.collectorDaemonSet.ports.otlpHttp }}
      protocol: TCP
      hostPort: {{ .Values.collectorDaemonSet.ports.otlpHttp }}
    - name: metrics
      port: 8888
      protocol: TCP

  # ── Host volume mounts ────────────────────────────────────────────────────
  # The filelog receiver reads container stdout/stderr from the node filesystem.
  # /var/log/pods  — Kubernetes writes container logs here, symlinked from /var/log/containers
  # /var/lib/docker/containers — needed on Docker runtimes for full log metadata
  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true

  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers

  env:
    - name: MY_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP

  config:
    receivers:
      # ── OTLP receiver (traces, metrics, SDK-emitted logs) ─────────────────
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:{{ .Values.collectorDaemonSet.ports.otlpGrpc }}"
            keepalive:
              server_parameters:
                max_connection_idle: 60s
                max_connection_age: 300s
                time: 30s
                timeout: 10s
            max_recv_msg_size_mib: 16
          http:
            endpoint: "0.0.0.0:{{ .Values.collectorDaemonSet.ports.otlpHttp }}"

      # ── filelog receiver — tails container log files from the node ─────────
      # Reads every pod's stdout/stderr from /var/log/pods/<namespace>_<pod>_<uid>/<container>/*.log
      # Scoped to the app namespace so we don't collect noisy system/infra logs.
      filelog:
        # Glob pattern — restrict to your app namespace to avoid noise.
        # Change {{ .Values.collectorDaemonSet.filelog.namespaceFilter }} to your
        # app namespace, or use "*" to collect from all namespaces.
        include:
          - /var/log/pods/{{ .Values.collectorDaemonSet.filelog.namespaceFilter }}_*/*/*.log
        exclude:
          # Never tail the collector's own logs — infinite loop risk
          - /var/log/pods/{{ .Values.global.namespace }}_*/*/*.log
        start_at: end       # "end" = only new lines after collector start; "beginning" = backfill
        include_file_path: true
        include_file_name: false

        # ── Kubernetes metadata from file path ────────────────────────────────
        # Path format: /var/log/pods/<namespace>_<pod-name>_<pod-uid>/<container>/<n>.log
        # The operators below parse this path into resource attributes.
        operators:
          # Step 1: tag log source type
          - type: add
            field: resource["log.source"]
            value: "filelog"

          # Step 2: parse namespace / pod-name / pod-uid from the file path
          - type: regex_parser
            id: parse_filepath
            regex: '^/var/log/pods/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<pod_uid>[^/]+)/(?P<container>[^/]+)/.*$'
            parse_from: attributes["log.file.path"]
            on_error: send

          # Step 3: promote parsed fields to resource attributes
          - type: move
            from: attributes.namespace
            to: resource["k8s.namespace.name"]
          - type: move
            from: attributes.pod_name
            to: resource["k8s.pod.name"]
          - type: move
            from: attributes.pod_uid
            to: resource["k8s.pod.uid"]
          - type: move
            from: attributes.container
            to: resource["k8s.container.name"]

          # Step 4: parse the outer Docker/containerd JSON wrapper
          # Kubernetes wraps each log line in {"log":"...","stream":"stdout","time":"..."}
          - type: json_parser
            id: parse_docker_wrapper
            parse_from: body
            on_error: send_quiet   # silently drop lines that aren't JSON-wrapped

          # Step 5: unwrap — the actual log content is in the "log" field
          - type: move
            from: attributes.log
            to: body

          # Step 6: try to parse the body as your app's JSON log format.
          # Expected fields from Python structlog / python-json-logger:
          #   {"timestamp":"...","level":"INFO","message":"...","trace_id":"...","span_id":"...","service":"..."}
          - type: json_parser
            id: parse_app_json
            parse_from: body
            on_error: send_quiet   # plain-text logs (e.g. startup lines) are forwarded as-is

          # Step 7: promote trace correlation fields to log record attributes
          # These are set by OTEL_PYTHON_LOG_CORRELATION=true in the Instrumentation CR.
          - type: move
            from: attributes.trace_id
            to: attributes["trace_id"]
            if: 'attributes.trace_id != nil'
          - type: move
            from: attributes.span_id
            to: attributes["span_id"]
            if: 'attributes.span_id != nil'
          - type: move
            from: attributes.trace_flags
            to: attributes["trace_flags"]
            if: 'attributes.trace_flags != nil'

          # Step 8: map Python log level string → OTel SeverityNumber
          - type: severity_parser
            parse_from: attributes.level
            on_error: send_quiet
            mapping:
              debug:    DEBUG
              info:     INFO
              warning:  WARN
              error:    ERROR
              critical: FATAL

          # Step 9: parse the app timestamp if present
          - type: time_parser
            parse_from: attributes.timestamp
            layout_type: strptime
            layout: '%Y-%m-%dT%H:%M:%S.%fZ'
            on_error: send_quiet

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15

      # Enrich every signal with k8s metadata (pod, namespace, node, deployment…)
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        filter:
          node_from_env_var: MY_NODE_NAME
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
          labels:
            - tag_name: app.label.component
              key: app.kubernetes.io/component
              from: pod
          annotations:
            - tag_name: app.annotation.version
              key: app.kubernetes.io/version
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      resource:
        attributes:
          - key: collector.type
            value: daemonset
            action: insert

      # Drop health-check and metrics-scrape spans before forwarding.
      filter/health:
        error_mode: ignore
        traces:
          span:
            - 'attributes["http.target"] == "/health"'
            - 'attributes["http.target"] == "/healthz"'
            - 'attributes["http.target"] == "/readyz"'
            - 'attributes["http.target"] == "/metrics"'
            - 'attributes["url.path"] == "/health"'
            - 'attributes["url.path"] == "/healthz"'
            - 'attributes["url.path"] == "/readyz"'
            - 'attributes["url.path"] == "/metrics"'

      # DaemonSet batch timeout (2s) << Aggregator decision_wait (10s).
      # Spans must arrive at the aggregator before its 10s decision window closes.
      batch:
        send_batch_size: 512
        send_batch_max_size: 1024
        timeout: 2s

    exporters:
      # ── Traces — routed by traceID so tail_sampling sees complete traces ───
      loadbalancing/traces:
        routing_key: traceID
        protocol:
          otlp:
            tls:
              insecure: true
            compression: gzip
            keepalive:
              time: 30s
              timeout: 10s
              permit_without_stream: true
            sending_queue:
              enabled: true
              num_consumers: 4
              queue_size: 100
            retry_on_failure:
              enabled: true
              initial_interval: 5s
              max_interval: 30s
              max_elapsed_time: 300s
        resolver:
          dns:
            hostname: "{{ include "otel.collectorAgg.name" . }}-collector-headless.{{ .Values.global.namespace }}.svc.cluster.local"
            port: 4317

      # ── Metrics & Logs — routed by service name (no traceID on these) ─────
      loadbalancing/metrics_logs:
        routing_key: service
        protocol:
          otlp:
            tls:
              insecure: true
            compression: gzip
            keepalive:
              time: 30s
              timeout: 10s
              permit_without_stream: true
            sending_queue:
              enabled: true
              num_consumers: 4
              queue_size: 100
            retry_on_failure:
              enabled: true
              initial_interval: 5s
              max_interval: 30s
              max_elapsed_time: 300s
        resolver:
          dns:
            hostname: "{{ include "otel.collectorAgg.name" . }}-collector-headless.{{ .Values.global.namespace }}.svc.cluster.local"
            port: 4317

      {{- if .Values.backends.debug.enabled }}
      debug:
        verbosity: {{ .Values.backends.debug.verbosity }}
        sampling_initial: {{ .Values.backends.debug.samplingInitial }}
        sampling_thereafter: {{ .Values.backends.debug.samplingThereafter }}
      {{- end }}

    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
      pprof:
        endpoint: "0.0.0.0:1777"
      zpages:
        endpoint: "0.0.0.0:55679"

    service:
      extensions: [health_check, pprof, zpages]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, resource, filter/health, batch]
          exporters:
            - loadbalancing/traces
            {{- if .Values.backends.debug.enabled }}
            - debug
            {{- end }}

        metrics:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters:  [loadbalancing/metrics_logs]

        logs:
          receivers:  [otlp, filelog]   # OTLP = SDK-emitted logs; filelog = stdout/stderr from /var/log/pods
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters:
            - loadbalancing/metrics_logs
            {{- if .Values.backends.debug.enabled }}
            - debug
            {{- end }}

      telemetry:
        logs:
          level: "info"
        metrics:
          address: "0.0.0.0:8888"
{{- end }}
