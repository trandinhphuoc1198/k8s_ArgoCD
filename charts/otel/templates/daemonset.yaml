# charts/otel/templates/collector-daemonset.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Node-level DaemonSet Collector
#
# Every pod annotated with auto-instrumentation sends OTLP to the local node's
# collector via the downward-API-injected env var:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://$(HOST_IP):4317
# This collector batches locally, enriches with k8sattributes, then forwards
# to the aggregator Deployment over gRPC.
# ─────────────────────────────────────────────────────────────────────────────
{{- if .Values.collectorDaemonSet.enabled }}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ include "otel.collectorDS.name" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "otel.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector-daemonset
spec:
  # ── Deployment mode ───────────────────────────────────────────────────────
  mode: daemonset

  # ── Service account (created separately) ─────────────────────────────────
  serviceAccount: otel-collector

  # ── Resource limits ───────────────────────────────────────────────────────
  resources:
    {{- toYaml .Values.collectorDaemonSet.resources | nindent 4 }}

  # ── Host network / port exposure ──────────────────────────────────────────
  # Pods send to HOST_IP:4317 — the DaemonSet pod is on every node.
  hostNetwork: false

  ports:
    - name: otlp-grpc
      port: {{ .Values.collectorDaemonSet.ports.otlpGrpc }}
      protocol: TCP
    - name: otlp-http
      port: {{ .Values.collectorDaemonSet.ports.otlpHttp }}
      protocol: TCP

  # ── Environment variables ─────────────────────────────────────────────────
  env:
    - name: MY_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP

  # ── Collector config ──────────────────────────────────────────────────────
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:{{ .Values.collectorDaemonSet.ports.otlpGrpc }}"
          http:
            endpoint: "0.0.0.0:{{ .Values.collectorDaemonSet.ports.otlpHttp }}"

    processors:
      # Enrich every span with k8s metadata (pod, namespace, node, deployment…)
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        filter:
          node_from_env_var: MY_NODE_NAME
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
          labels:
            - tag_name: app.label.component
              key: app.kubernetes.io/component
              from: pod
          annotations:
            - tag_name: app.annotation.version
              key: app.kubernetes.io/version
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      # Add node name as a resource attribute
      resource:
        attributes:
          - key: k8s.node.name
            value: "${MY_NODE_NAME}"
            action: insert
          - key: collector.type
            value: daemonset
            action: insert

      # Batch before forwarding to reduce gRPC calls
      batch:
        send_batch_size: 512
        send_batch_max_size: 1024
        timeout: 5s

      # Drop noisy health-check spans
      filter/health:
        error_mode: ignore
        traces:
          span:
            - 'attributes["http.target"] == "/health"'
            - 'attributes["http.target"] == "/healthz"'
            - 'attributes["http.target"] == "/readyz"'
            - 'attributes["http.route"] == "/metrics"'

      # Memory limiter — safety valve
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15

    exporters:
      # Forward to the aggregator Deployment
      otlp/aggregator:
        endpoint: "{{ include "otel.collectorAgg.name" . }}-collector.{{ .Values.global.namespace }}.svc.cluster.local:4317"
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 100
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      # Debug exporter — disable in production
      debug:
        verbosity: basic
        sampling_initial: 2
        sampling_thereafter: 100

    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
      pprof:
        endpoint: "0.0.0.0:1777"
      zpages:
        endpoint: "0.0.0.0:55679"

    service:
      extensions: [health_check, pprof, zpages]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, resource, filter/health, batch]
          exporters:  [otlp/aggregator]
        metrics:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters:  [otlp/aggregator]
        logs:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters:  [otlp/aggregator]

      telemetry:
        logs:
          level: "info"
        metrics:
          address: "0.0.0.0:8888"
{{- end }}