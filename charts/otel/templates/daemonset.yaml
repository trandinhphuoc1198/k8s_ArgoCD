# charts/otel/templates/collector-daemonset.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Node-level DaemonSet Collector
#
# Receives OTLP/gRPC from every pod on the node, enriches spans with k8s
# metadata, filters health-check noise, then routes to the aggregator using a
# loadbalancing exporter keyed by traceID.
#
# The traceID-based load balancing is REQUIRED when the aggregator runs as a
# multi-replica Deployment with tail_sampling: all spans of a trace must land
# on the same aggregator replica so the sampler can evaluate the full trace.
# ─────────────────────────────────────────────────────────────────────────────
{{- if .Values.collectorDaemonSet.enabled }}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ include "otel.collectorDS.name" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "otel.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector-daemonset
spec:
  mode: daemonset
  serviceAccount: otel-collector

  resources:
    {{- toYaml .Values.collectorDaemonSet.resources | nindent 4 }}

  hostNetwork: false
  ports:
    - name: otlp-grpc
      port: {{ .Values.collectorDaemonSet.ports.otlpGrpc }}
      protocol: TCP

  env:
    - name: MY_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:{{ .Values.collectorDaemonSet.ports.otlpGrpc }}"
            keepalive:
              server_parameters:
                max_connection_idle: 60s
                max_connection_age: 300s
                time: 30s
                timeout: 10s
            max_recv_msg_size_mib: 16

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15

      # Enrich every span with k8s metadata (pod, namespace, node, deployment…)
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        filter:
          node_from_env_var: MY_NODE_NAME
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
          labels:
            - tag_name: app.label.component
              key: app.kubernetes.io/component
              from: pod
          annotations:
            - tag_name: app.annotation.version
              key: app.kubernetes.io/version
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      # Stamp the collector type — k8sattributes already sets k8s.node.name
      # from pod metadata so we only add the collector.type marker here.
      resource:
        attributes:
          - key: collector.type
            value: daemonset
            action: insert

      # Drop health-check and metrics-scrape spans before forwarding.
      # Both old (http.target) and new (url.path) semconv attribute names are
      # checked for compatibility across SDK versions.
      filter/health:
        error_mode: ignore
        traces:
          span:
            - 'attributes["http.target"] == "/health"'
            - 'attributes["http.target"] == "/healthz"'
            - 'attributes["http.target"] == "/readyz"'
            - 'attributes["http.target"] == "/metrics"'
            - 'attributes["url.path"] == "/health"'
            - 'attributes["url.path"] == "/healthz"'
            - 'attributes["url.path"] == "/readyz"'
            - 'attributes["url.path"] == "/metrics"'

      # The DaemonSet batch timeout must be significantly less than the
      # aggregator's tail_sampling.decision_wait (10s). Spans need to arrive
      # at the aggregator well before the decision window closes so the sampler
      # sees a complete trace. 2s here gives an 8s margin before the 10s window.
      batch:
        send_batch_size: 512
        send_batch_max_size: 1024
        timeout: 2s

    exporters:
      # ── 1. Trace Exporter ─────────────────────────────────────────────────
      # Routes all spans of the same trace to the same aggregator replica.
      # Mandatory for correct tail-sampling decisions.
      loadbalancing/traces:
        routing_key: traceID
        protocol:
          otlp:
            tls:
              insecure: true
            compression: gzip
            keepalive:
              time: 30s
              timeout: 10s
              permit_without_stream: true
            sending_queue:
              enabled: true
              num_consumers: 4
              queue_size: 100
            retry_on_failure:
              enabled: true
              initial_interval: 5s
              max_interval: 30s
              max_elapsed_time: 300s
        resolver:
          dns:
            hostname: "{{ include "otel.collectorAgg.name" . }}-collector-headless.{{ .Values.global.namespace }}.svc.cluster.local"
            port: 4317

      # ── 2. Metrics & Logs Exporter ────────────────────────────────────────
      # Routes metrics and logs by service name, as they lack trace IDs.
      loadbalancing/metrics_logs:
        routing_key: service
        protocol:
          otlp:
            tls:
              insecure: true
            compression: gzip
            keepalive:
              time: 30s
              timeout: 10s
              permit_without_stream: true
            sending_queue:
              enabled: true
              num_consumers: 4
              queue_size: 100
            retry_on_failure:
              enabled: true
              initial_interval: 5s
              max_interval: 30s
              max_elapsed_time: 300s
        resolver:
          dns:
            hostname: "{{ include "otel.collectorAgg.name" . }}-collector-headless.{{ .Values.global.namespace }}.svc.cluster.local"
            port: 4317

      debug:
        verbosity: basic
        sampling_initial: 2
        sampling_thereafter: 100

    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
      pprof:
        endpoint: "0.0.0.0:1777"
      zpages:
        endpoint: "0.0.0.0:55679"

    service:
      extensions: [health_check, pprof, zpages]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, resource, filter/health, batch]
          exporters:  [loadbalancing/traces]    # <-- Uses traceID
        metrics:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters:  [loadbalancing/metrics_logs]  # <-- Uses service
        logs:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters:  [loadbalancing/metrics_logs]  # <-- Uses service

      telemetry:
        logs:
          level: "info"
        metrics:
          address: "0.0.0.0:8888"
{{- end }}