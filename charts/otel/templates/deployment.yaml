# charts/otel/templates/collector-deployment.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Aggregator Collector (Deployment mode)
#
# Fan-in point: receives from all node-level DaemonSet collectors, applies
# tail-sampling, then exports to Jaeger / Prometheus / Tempo / external OTLP.
#
# IMPORTANT — tail_sampling + multiple replicas:
#   The DaemonSet uses a loadbalancing exporter (routing_key: traceID) so all
#   spans of a trace always arrive at the same aggregator replica. Without this,
#   tail_sampling evaluates incomplete traces and makes wrong decisions.
# ─────────────────────────────────────────────────────────────────────────────
{{- if .Values.collectorDeployment.enabled }}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ include "otel.collectorAgg.name" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "otel.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector-aggregator
spec:
  mode: deployment
  replicas: {{ .Values.collectorDeployment.replicas }}
  serviceAccount: otel-collector

  resources:
    {{- toYaml .Values.collectorDeployment.resources | nindent 4 }}

  ports:
    - name: otlp-grpc
      port: {{ .Values.collectorDaemonSet.ports.otlpGrpc }}
      protocol: TCP
      hostPort: {{ .Values.collectorDaemonSet.ports.otlpGrpc }}
    # Expose OTLP/HTTP port so your Gunicorn/Uvicorn workers can push traces via http/protobuf
    # - name: otlp-http
    #   port: {{ .Values.collectorDaemonSet.ports.otlpHttp }}
    #   protocol: TCP
    #   hostPort: {{ .Values.collectorDaemonSet.ports.otlpHttp }}
    - name: metrics
      port: 8888
      protocol: TCP

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
            keepalive:
              server_parameters:
                max_connection_idle: 60s
                max_connection_age: 300s
                time: 30s
                timeout: 10s
            max_recv_msg_size_mib: 16

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 20

      # ── Tail-based sampling ───────────────────────────────────────────────
      # Buffers all spans for a trace until decision_wait expires, then
      # evaluates policies against the COMPLETE trace.
      #
      # Policy evaluation: a trace is KEPT if ANY policy matches.
      # Policies are evaluated independently — there is no "else" chain.
      # This is correct here because:
      #   - errors-policy  → keep 100 % (overrides nothing, just keeps)
      #   - slow-policy    → keep 100 % (same)
      #   - default-policy → keep 10 %  (fires on ALL traces including errors/slow,
      #                      but those are already kept so the outcome is identical)
      #
      tail_sampling:
        decision_wait: {{ .Values.collectorDeployment.tailSampling.decisionWait }}
        num_traces: {{ .Values.collectorDeployment.tailSampling.numTraces }}
        expected_new_traces_per_sec: {{ .Values.collectorDeployment.tailSampling.expectedTracesPerSec }}
        policies:
          {{- if .Values.collectorDeployment.tailSampling.errors.enabled }}
          # Keep every trace that contains at least one ERROR span.
          # Catches: 5xx HTTP responses, unhandled exceptions, gRPC non-OK codes.
          - name: errors-policy
            type: status_code
            status_code:
              status_codes: [ERROR]
          {{- end }}
          {{- if .Values.collectorDeployment.tailSampling.slow.enabled }}
          # Keep every trace whose root span duration exceeds the SLO threshold.
          # Catches: slow DB queries, downstream timeouts, GC pauses.
          - name: slow-policy
            type: latency
            latency:
              threshold_ms: {{ .Values.collectorDeployment.tailSampling.slow.thresholdMs }}
          {{- end }}
          # Probabilistic fallback — keep N % of all remaining traces.
          # Also evaluates on error/slow traces but they are already kept above,
          # so the effective drop rate for those is 0 % regardless.
          - name: default-policy
            type: probabilistic
            probabilistic:
              sampling_percentage: {{ .Values.collectorDeployment.tailSampling.default.samplingPercentage }}

      # Redact sensitive fields before export
      attributes/redact:
        actions:
          - key: http.request.header.authorization
            action: delete
          - key: db.statement
            action: hash
      # Add the transform processor for regex string replacements
      transform/redact:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              # $1 retains the matched parameter name (e.g., "token"), replacing the value
              # Result: "http://api.com?token=123" -> "http://api.com?token=REDACTED"
              - replace_pattern(attributes["http.url"], "(password|token|secret|key)=[^&]*", "$$1=REDACTED")

      resource/env:
        attributes:
          - key: deployment.environment
            value: {{ .Values.instrumentation.resourceAttributes | dig "deployment.environment" "production" | quote }}
            action: upsert

      # batch runs AFTER tail_sampling in the pipeline, so its timeout has no
      # effect on sampling decisions — tail_sampling manages its own in-memory
      # buffering independently. This timeout simply controls how long to
      # accumulate already-sampled spans before flushing to the exporters.
      batch:
        send_batch_size: {{ .Values.collectorDeployment.batch.sendBatchSize }}
        send_batch_max_size: {{ .Values.collectorDeployment.batch.sendBatchMaxSize }}
        timeout: {{ .Values.collectorDeployment.batch.timeout }}

    exporters:
      {{- if .Values.backends.jaeger.enabled }}
      # ── Jaeger ─────────────────────────────────────────────────────────────
      otlp/jaeger:
        endpoint: {{ .Values.backends.jaeger.endpoint | quote }}
        tls:
          insecure: true
        compression: gzip
        keepalive:
          time: 30s
          timeout: 10s
          permit_without_stream: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 60s
      {{- end }}

      {{- if .Values.backends.tempo.enabled }}
      # ── Grafana Tempo ──────────────────────────────────────────────────────
      otlp/tempo:
        endpoint: {{ .Values.backends.tempo.endpoint | quote }}
        tls:
          insecure: true
        compression: gzip
        keepalive:
          time: 30s
          timeout: 10s
          permit_without_stream: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
      {{- end }}

      {{- if .Values.backends.prometheus.enabled }}
      # ── Prometheus remote-write ────────────────────────────────────────────
      prometheusremotewrite:
        endpoint: {{ .Values.backends.prometheus.endpoint | quote }}
        tls:
          insecure_skip_verify: false
        resource_to_telemetry_conversion:
          enabled: true
        retry_on_failure:
          enabled: true
      {{- end }}

      {{- if .Values.backends.otlpExternal.enabled }}
      # ── External OTLP endpoint ─────────────────────────────────────────────
      otlp/external:
        endpoint: {{ .Values.backends.otlpExternal.endpoint | quote }}
        tls:
          insecure: {{ .Values.backends.otlpExternal.tls.insecure }}
        compression: gzip
        keepalive:
          time: 30s
          timeout: 10s
          permit_without_stream: true
        headers:
          {{- toYaml .Values.backends.otlpExternal.headers | nindent 10 }}
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
      {{- end }}

      # ── Dynamic Debug Exporter ─────────────────────────────────────────────
      {{- if .Values.backends.debug.enabled }}
      debug:
        verbosity: {{ .Values.backends.debug.verbosity }}
        sampling_initial: {{ .Values.backends.debug.samplingInitial }}
        sampling_thereafter: {{ .Values.backends.debug.samplingThereafter }}
      {{- end }}

    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
      pprof:
        endpoint: "0.0.0.0:1777"
      zpages:
        endpoint: "0.0.0.0:55679"

    service:
      extensions: [health_check, pprof, zpages]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, tail_sampling, attributes/redact, transform/redact, resource/env, batch]
          exporters:
            {{- if .Values.backends.debug.enabled }}
            - debug
            {{- end }}
            {{- if .Values.backends.jaeger.enabled }}
            - otlp/jaeger
            {{- end }}
            {{- if .Values.backends.tempo.enabled }}
            - otlp/tempo
            {{- end }}
            {{- if .Values.backends.otlpExternal.enabled }}
            - otlp/external
            {{- end }}

        metrics:
          receivers:  [otlp]
          processors: [memory_limiter, resource/env, batch]
          exporters:
            - debug
            {{- if .Values.backends.prometheus.enabled }}
            - prometheusremotewrite
            {{- end }}
            {{- if .Values.backends.otlpExternal.enabled }}
            - otlp/external
            {{- end }}

        logs:
          receivers:  [otlp]
          processors: [memory_limiter, resource/env, batch]
          exporters:
            - debug
            {{- if .Values.backends.otlpExternal.enabled }}
            - otlp/external
            {{- end }}

      telemetry:
        logs:
          level: "info"
        metrics:
          address: "0.0.0.0:8888"
{{- end }}