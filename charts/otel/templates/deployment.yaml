# charts/otel/templates/collector-deployment.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Aggregator Collector (Deployment mode)
#
# Fan-in point: receives from all node-level DaemonSet collectors, applies
# tail-sampling on traces, then exports to backends.
#
# Signal routing:
#   traces  → tail_sampling → Tempo (+ Jaeger if enabled)
#   metrics → Prometheus remote-write
#   logs    → Loki (when enabled) — with trace_id/span_id attributes preserved
#             for click-through correlation in Grafana Explore
#
# IMPORTANT — tail_sampling + multiple replicas:
#   The DaemonSet uses loadbalancing/traces (routing_key: traceID) so all
#   spans of a trace always land on the same aggregator replica. Without this,
#   tail_sampling evaluates incomplete traces and makes wrong decisions.
# ─────────────────────────────────────────────────────────────────────────────
{{- if .Values.collectorDeployment.enabled }}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ include "otel.collectorAgg.name" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "otel.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector-aggregator
spec:
  mode: deployment
  replicas: {{ .Values.collectorDeployment.replicas }}
  serviceAccount: otel-collector

  resources:
    {{- toYaml .Values.collectorDeployment.resources | nindent 4 }}

  ports:
    - name: otlp-grpc
      port: {{ .Values.collectorDaemonSet.ports.otlpGrpc }}
      protocol: TCP
    - name: metrics
      port: 8888
      protocol: TCP

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
            keepalive:
              server_parameters:
                max_connection_idle: 60s
                max_connection_age: 300s
                time: 30s
                timeout: 10s
            max_recv_msg_size_mib: 16

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 20

      # ── Tail-based sampling (traces only) ─────────────────────────────────
      # Buffers all spans for a trace until decision_wait expires, then
      # evaluates policies against the COMPLETE trace.
      # Policy evaluation: a trace is KEPT if ANY policy matches.
      tail_sampling:
        decision_wait: {{ .Values.collectorDeployment.tailSampling.decisionWait }}
        num_traces: {{ .Values.collectorDeployment.tailSampling.numTraces }}
        expected_new_traces_per_sec: {{ .Values.collectorDeployment.tailSampling.expectedTracesPerSec }}
        policies:
          {{- if .Values.collectorDeployment.tailSampling.errors.enabled }}
          - name: errors-policy
            type: status_code
            status_code:
              status_codes: [ERROR]
          {{- end }}
          {{- if .Values.collectorDeployment.tailSampling.slow.enabled }}
          - name: slow-policy
            type: latency
            latency:
              threshold_ms: {{ .Values.collectorDeployment.tailSampling.slow.thresholdMs }}
          {{- end }}
          - name: default-policy
            type: probabilistic
            probabilistic:
              sampling_percentage: {{ .Values.collectorDeployment.tailSampling.default.samplingPercentage }}

      # ── Sensitive field redaction ─────────────────────────────────────────
      # Applied to traces before export. Logs are not redacted here — the
      # application should never log raw credentials in the first place.
      attributes/redact:
        actions:
          - key: http.request.header.authorization
            action: delete
          - key: db.statement
            action: hash

      # transform/redact handles regex replacements that attributes/redact
      # cannot express (pattern matching on values, not just key names).
      transform/redact:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              # Scrub sensitive query params from URLs.
              # $1 retains the param name, replacing only the value.
              # "http://api.com?token=abc" → "http://api.com?token=REDACTED"
              - replace_pattern(attributes["http.url"], "(?i)(password|token|secret|key)=[^&]*", "$$1=REDACTED")

      # ── Log enrichment ────────────────────────────────────────────────────
      # Promote trace_id and span_id from log body attributes (set by
      # OTEL_PYTHON_LOG_CORRELATION=true) to log record attributes so Loki
      # can index them and Grafana can render the trace link.
      transform/logs:
        error_mode: ignore
        log_statements:
          - context: log
            statements:
              # Normalise severity text for consistent Loki label values
              - set(severity_text, ConvertCase(severity_text, "upper")) where severity_text != ""

      resource/env:
        attributes:
          - key: deployment.environment
            value: {{ .Values.instrumentation.resourceAttributes | dig "deployment.environment" "production" | quote }}
            action: upsert

      # batch runs AFTER tail_sampling — its timeout only controls export
      # flush frequency, not sampling decisions.
      batch:
        send_batch_size: {{ .Values.collectorDeployment.batch.sendBatchSize }}
        send_batch_max_size: {{ .Values.collectorDeployment.batch.sendBatchMaxSize }}
        timeout: {{ .Values.collectorDeployment.batch.timeout }}

    exporters:
      {{- if .Values.backends.jaeger.enabled }}
      # ── Jaeger ─────────────────────────────────────────────────────────────
      otlp/jaeger:
        endpoint: {{ .Values.backends.jaeger.endpoint | quote }}
        tls:
          insecure: true
        compression: gzip
        keepalive:
          time: 30s
          timeout: 10s
          permit_without_stream: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 60s
      {{- end }}

      {{- if .Values.backends.tempo.enabled }}
      # ── Grafana Tempo — traces ─────────────────────────────────────────────
      otlp/tempo:
        endpoint: {{ .Values.backends.tempo.endpoint | quote }}
        tls:
          insecure: true
        compression: gzip
        keepalive:
          time: 30s
          timeout: 10s
          permit_without_stream: true
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
      {{- end }}

      {{- if .Values.backends.prometheus.enabled }}
      # ── Prometheus remote-write — metrics ─────────────────────────────────
      prometheusremotewrite:
        endpoint: {{ .Values.backends.prometheus.endpoint | quote }}
        tls:
          insecure_skip_verify: false
        resource_to_telemetry_conversion:
          enabled: true
        retry_on_failure:
          enabled: true
      {{- end }}

      {{- if .Values.backends.loki.enabled }}
      # ── Grafana Loki — logs ────────────────────────────────────────────────
      # The loki exporter maps OTel resource/log attributes to Loki labels and
      # log line fields. trace_id and span_id are preserved as structured
      # metadata so Grafana can render "Jump to trace" links from log lines.
      otlphttp:
        endpoint: {{ .Values.backends.loki.endpoint | quote }}
        headers:
          X-Scope-OrgID: "fake"

      {{- end }}

      {{- if .Values.backends.otlpExternal.enabled }}
      # ── External OTLP endpoint ─────────────────────────────────────────────
      otlp/external:
        endpoint: {{ .Values.backends.otlpExternal.endpoint | quote }}
        tls:
          insecure: {{ .Values.backends.otlpExternal.tls.insecure }}
        compression: gzip
        keepalive:
          time: 30s
          timeout: 10s
          permit_without_stream: true
        headers:
          {{- toYaml .Values.backends.otlpExternal.headers | nindent 10 }}
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
      {{- end }}

      {{- if .Values.backends.debug.enabled }}
      debug:
        verbosity: {{ .Values.backends.debug.verbosity }}
        sampling_initial: {{ .Values.backends.debug.samplingInitial }}
        sampling_thereafter: {{ .Values.backends.debug.samplingThereafter }}
      {{- end }}

    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
      pprof:
        endpoint: "0.0.0.0:1777"
      zpages:
        endpoint: "0.0.0.0:55679"

    service:
      extensions: [health_check, pprof, zpages]
      pipelines:
        # ── Traces ───────────────────────────────────────────────────────────
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, tail_sampling, attributes/redact, transform/redact, resource/env, batch]
          exporters:
            {{- if .Values.backends.debug.enabled }}
            - debug
            {{- end }}
            {{- if .Values.backends.jaeger.enabled }}
            - otlp/jaeger
            {{- end }}
            {{- if .Values.backends.tempo.enabled }}
            - otlp/tempo
            {{- end }}
            {{- if .Values.backends.otlpExternal.enabled }}
            - otlp/external
            {{- end }}

        # # ── Metrics ──────────────────────────────────────────────────────────
        # metrics:
        #   receivers:  [otlp]
        #   processors: [memory_limiter, resource/env, batch]
        #   exporters:
        #     {{- if .Values.backends.debug.enabled }}
        #     - debug
        #     {{- end }}
        #     {{- if .Values.backends.prometheus.enabled }}
        #     - prometheusremotewrite
        #     {{- end }}
        #     {{- if .Values.backends.otlpExternal.enabled }}
        #     - otlp/external
        #     {{- end }}

        # ── Logs ─────────────────────────────────────────────────────────────
        # Receives:
        #   - SDK-emitted logs (OTEL_LOGS_EXPORTER=otlp) via OTLP from DaemonSet
        #   - Container stdout/stderr (filelog receiver) from DaemonSet
        # Both sources already carry trace_id/span_id when log correlation is on.
        logs:
          receivers:  [otlp]
          processors: [memory_limiter, transform/logs, resource/env, batch]
          exporters:
            {{- if .Values.backends.debug.enabled }}
            - debug
            {{- end }}
            {{- if .Values.backends.loki.enabled }}
            - otlphttp
            {{- end }}
            {{- if .Values.backends.otlpExternal.enabled }}
            - otlp/external
            {{- end }}

      telemetry:
        logs:
          level: "info"
        metrics:
          address: "0.0.0.0:8888"
{{- end }}
