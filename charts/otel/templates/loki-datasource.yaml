# charts/otel/templates/loki-datasource.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Grafana datasource ConfigMap for Loki
#
# Auto-provisioned into kube-prometheus-stack Grafana via the sidecar that
# watches for ConfigMaps labelled grafana_datasource=1.
#
# Configures:
#   - Loki as a log datasource
#   - Derived fields that turn trace_id values into clickable links to Tempo
#   - correlates log → trace in Grafana Explore with one click
# ─────────────────────────────────────────────────────────────────────────────
{{- if .Values.backends.loki.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-grafana-datasource
  namespace: {{ .Values.global.monitoringNamespace | default "monitoring" }}
  labels:
    grafana_datasource: "1"
    {{- include "otel.labels" . | nindent 4 }}
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki-gateway.{{ .Values.global.namespace }}.svc.cluster.local
        version: 1
        isDefault: false
        editable: false
        jsonData:
          maxLines: 1000
          timeout: 60
          httpHeaderName1: "X-Scope-OrgID"
          derivedFields:
            - name: TraceID
              matcherType: label
              matcherRegex: trace_id
              url: "$${__value.raw}"
              urlDisplayLabel: "View Trace in Tempo"
              datasourceUid: tempo
            - name: TraceID_body
              matcherType: regex
              matcherRegex: '"trace_id"\s*:\s*"([a-f0-9]{32})"'
              url: "$${__value.raw}"
              urlDisplayLabel: "View Trace in Tempo"
              datasourceUid: tempo
        secureJsonData:
          httpHeaderValue1: "dev"

{{- end }}
