# charts/otel/templates/tempo-s3-secret.yaml
# ─────────────────────────────────────────────────────────────────────────────
# S3 credentials Secret for Grafana Tempo (static key auth).
#
# Populate before deploying:
#   kubectl create secret generic tempo-s3-credentials \
#     --namespace observability \
#     --from-literal=S3_ACCESS_KEY_ID=YOUR_ACCESS_KEY \
#     --from-literal=S3_SECRET_ACCESS_KEY=YOUR_SECRET_KEY \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or set values via --set in deploy.sh:
#   --set tempo.s3.accessKey=... --set tempo.s3.secretKey=...
#
# The Secret is referenced by every Tempo component that reads/writes S3
# (distributor, ingester, querier, compactor) via envFrom in tempo-values.yaml.
# ─────────────────────────────────────────────────────────────────────────────
{{- if .Values.tempo.s3.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: tempo-s3-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "otel.labels" . | nindent 4 }}
type: Opaque
stringData:
  S3_ACCESS_KEY_ID:     {{ .Values.tempo.s3.accessKey | required "tempo.s3.accessKey is required when tempo.s3.createSecret=true" | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.tempo.s3.secretKey | required "tempo.s3.secretKey is required when tempo.s3.createSecret=true" | quote }}
{{- end }}