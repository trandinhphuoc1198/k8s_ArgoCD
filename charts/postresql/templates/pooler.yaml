{{- if .Values.pooler.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ include "postgresql.poolerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  # ── Point at the Cluster ───────────────────────────────
  cluster:
    name: {{ include "postgresql.clusterName" . }}

  # Route to the primary (read-write).
  # For read replicas, create a second Pooler with type: ro
  type: rw

  # ── Pooler instances ───────────────────────────────────
  instances: {{ .Values.pooler.instances }}

  # ── PgBouncer config ───────────────────────────────────
  pgbouncer:
    poolMode: {{ .Values.pooler.poolMode }}
    parameters:
      max_client_conn: "{{ .Values.pooler.maxClientConn }}"
      default_pool_size: "{{ .Values.pooler.defaultPoolSize }}"
      # Recommended for transaction mode with async frameworks
      server_reset_query: ""
      # Keep idle server connections alive
      server_idle_timeout: "600"
      # Log slow queries (ms). 0 = disabled
      log_stats: "1"

  # ── Resources ──────────────────────────────────────────
  template:
    spec:
      containers:
        - name: pgbouncer
          resources:
            {{- toYaml .Values.pooler.resources | nindent 12 }}

  # ── Service: ClusterIP only (internal to cluster) ──────
  # FastAPI connects to:
  #   {{ .Values.pooler.name }}-rw.{{ .Release.Namespace }}.svc.cluster.local:5432
{{- end }}
