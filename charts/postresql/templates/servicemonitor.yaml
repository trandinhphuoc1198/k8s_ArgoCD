{{- if .Values.monitoring.enabled }}
# ──────────────────────────────────────────────────────────────────────────────
# ServiceMonitor — scrapes the CNPG built-in metrics exporter (port 9187)
# The Cluster's enablePodMonitor=true creates a PodMonitor automatically,
# but we add an explicit ServiceMonitor here for consistency with your
# existing kube-prometheus-stack pattern (ServiceMonitor on every component).
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "postgresql.clusterName" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
    # This label must match kube-prometheus-stack's serviceMonitorSelector
    {{- include "postgresql.monitoringLabels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      # CNPG labels every Cluster service with cnpg.io/cluster
      cnpg.io/cluster: {{ include "postgresql.clusterName" . }}

  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}

  endpoints:
    - port: metrics          # CNPG exposes this port on each pod's service
      interval: {{ .Values.monitoring.interval }}
      scrapeTimeout: {{ .Values.monitoring.scrapeTimeout }}
      path: /metrics
      scheme: http

---
# ──────────────────────────────────────────────────────────────────────────────
# ServiceMonitor — scrapes PgBouncer metrics exporter (port 9127)
# ──────────────────────────────────────────────────────────────────────────────
{{- if .Values.pooler.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "postgresql.poolerName" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
    {{- include "postgresql.monitoringLabels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      cnpg.io/poolerName: {{ include "postgresql.poolerName" . }}

  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}

  endpoints:
    - port: metrics
      interval: {{ .Values.monitoring.interval }}
      scrapeTimeout: {{ .Values.monitoring.scrapeTimeout }}
      path: /metrics
      scheme: http
{{- end }}
{{- end }}
