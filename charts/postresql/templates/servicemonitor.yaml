{{- if .Values.monitoring.enabled }}
# ──────────────────────────────────────────────────────────────────────────────
# ServiceMonitor — CloudNativePG Cluster metrics (port 9187)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "postgresql.clusterName" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
    {{- include "postgresql.monitoringLabels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: {{ include "postgresql.clusterName" . }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics
      interval: {{ .Values.monitoring.interval }}
      scrapeTimeout: {{ .Values.monitoring.scrapeTimeout }}
      path: /metrics
      scheme: http

---
# ──────────────────────────────────────────────────────────────────────────────
# ServiceMonitor — PgBouncer RW Pooler metrics (port 9127)
# ──────────────────────────────────────────────────────────────────────────────
{{- if .Values.pooler.rw.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Values.pooler.rw.name }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
    {{- include "postgresql.monitoringLabels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer-rw
spec:
  selector:
    matchLabels:
      cnpg.io/poolerName: {{ .Values.pooler.rw.name }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics
      interval: {{ .Values.monitoring.interval }}
      scrapeTimeout: {{ .Values.monitoring.scrapeTimeout }}
      path: /metrics
      scheme: http
{{- end }}

