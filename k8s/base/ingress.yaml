apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastapi-ingress
  namespace: fastapi
  labels:
    app: fastapi
spec:
  ingressClassName: nginx
  rules:
  # Replace with your ALB DNS name, e.g. my-alb-1234567890.ap-northeast-1.elb.amazonaws.com
  - host: fast-api-k8s-1011545333.ap-northeast-1.elb.amazonaws.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fastapi-service
            port:
              number: 8000
