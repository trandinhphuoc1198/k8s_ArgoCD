# values.yaml
autoDiscovery:
  clusterName: dev-k8s   # must match ASG tag

awsRegion: ap-northeast-1            # change to your region

cloudProvider: aws

rbac:
  create: true

# Scale-in settings
scaleDown:
  enabled: true
  delayAfterAdd: 5m        # wait 10m after scale-out before considering scale-in
  delayAfterDelete: 10s     # wait 10s after a node deletion
  delayAfterFailure: 3m     # backoff on failure
  unneededTime: 5m         # node must be unneeded for 10m before removal
  utilizationThreshold: 0.5 # scale in if node utilization < 50%

# Recommended extra flags
extraArgs:
  skip-nodes-with-local-storage: false
  skip-nodes-with-system-pods: true  # don't remove nodes running system pods
  balance-similar-node-groups: true  # balance across multiple ASGs evenly
  expander: least-waste               # scale-out strategy: pick ASG with least wasted resources
  balancing-ignore-label: node-role.kubernetes.io/control-plane

# Pod resources
resources:
  requests:
    cpu: 100m
    memory: 150Mi
  limits:
    cpu: 100m
    memory: 600Mi


# Node selector — pin CA to a stable node (optional but recommended)
nodeSelector:
  node-role.kubernetes.io/control-plane: ""
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
