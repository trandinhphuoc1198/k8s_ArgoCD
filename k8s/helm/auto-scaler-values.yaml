# values.yaml
autoDiscovery:
  clusterName: dev-k8s   # must match ASG tag

awsRegion: ap-northeast-1            # change to your region

cloudProvider: aws

rbac:
  create: true


# Recommended extra flags
extraArgs:
  skip-nodes-with-local-storage: false
  skip-nodes-with-system-pods: true  # don't remove nodes running system pods
  balance-similar-node-groups: true  # balance across multiple ASGs evenly
  expander: least-waste               # scale-out strategy: pick ASG with least wasted resources
  balancing-ignore-label: node-role.kubernetes.io/control-plane
  scale-down-unneeded-time: 2m
  scale-down-delay-after-add: 2m
  scale-down-delay-after-delete: 0s
  scale-down-delay-after-failure: 3m


# Pod resources
resources:
  requests:
    cpu: 100m
    memory: 150Mi
  limits:
    cpu: 100m
    memory: 600Mi


# Node selector — pin CA to a stable node (optional but recommended)
nodeSelector:
  node-role.kubernetes.io/control-plane: ""
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
