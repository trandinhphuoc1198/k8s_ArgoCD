# Place this file at: your NGINX Ingress Helm values file
# Only the location path changed — from /healthz to /alb-health

controller:
  replicaCount: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
  config:
      enable-opentelemetry: "true"
      otlp-collector-host: "otel-collector-ds-collector.observability.svc.cluster.local"
      otlp-collector-port: "4317"
      opentelemetry-trust-incoming-span: "true"
      opentelemetry-operation-name: "$request_method $uri"
      server-snippet: |
        location /alb-health {
          access_log off;
          return 200 "ok";
          add_header Content-Type text/plain;
        }

  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

defaultBackend:
  enabled: true