controller:
  replicaCount: 2
  config:
      enable-opentelemetry: "true"
      otlp-collector-host: "otel-collector.observability.svc.cluster.local"
      otlp-collector-port: "4317"
      opentelemetry-trust-incoming-span: "true"
      opentelemetry-operation-name: "$request_method $uri"


  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

defaultBackend:
  enabled: true