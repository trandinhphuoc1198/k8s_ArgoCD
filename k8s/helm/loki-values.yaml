# k8s/helm/loki-values.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Grafana Loki — distributed mode on self-hosted K8S (EC2)
# Storage backend: AWS S3 bucket: log-s3-phuoctd6
# Auth: static IAM credentials via Secret/loki-s3-credentials
# Retention: 1 day
#
# Install:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   helm upgrade --install loki grafana/loki-distributed \
#     --namespace observability \
#     --values k8s/helm/loki-values.yaml \
#     --wait
#
# Prerequisites:
#   1. Secret/loki-s3-credentials exists in the observability namespace
#      (created by charts/otel/templates/loki-s3-secret.yaml)
#   2. IAM user has s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket
#      on bucket log-s3-phuoctd6
# ─────────────────────────────────────────────────────────────────────────────

# ---------------------------------------------------------------------------
# Global Loki config
# ---------------------------------------------------------------------------
loki:
  # Distributor — accepts push requests from the OTel aggregator loki exporter
  # Ingester   — buffers chunks in memory, flushes to S3
  # Querier    — reads from ingesters (hot) + S3 (cold)
  # Query Frontend — shards queries across queriers; Grafana connects here
  # Compactor  — merges S3 chunks, enforces retention
  # Index Gateway — caches S3 index lookups (boltdb-shipper / tsdb)

  structuredConfig:
    auth_enabled: false   # single-tenant mode — no X-Scope-OrgID header needed

    # ── Storage ────────────────────────────────────────────────────────────
    common:
      storage:
        s3:
          bucketnames: log-s3-phuoctd6
          region: ap-northeast-1
          # Credentials injected from env vars via extraEnvFrom (see each
          # component block below). AWS SDK reads AWS_ACCESS_KEY_ID +
          # AWS_SECRET_ACCESS_KEY automatically — no keys set here.
          insecure: false
      replication_factor: 3
      ring:
        kvstore:
          store: memberlist

    # ── Schema — tsdb is the current recommended index type ───────────────
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    # ── Storage config ─────────────────────────────────────────────────────
    storage_config:
      tsdb_shipper:
        active_index_directory: /var/loki/tsdb-index
        cache_location: /var/loki/tsdb-cache
        cache_ttl: 24h
      aws:
        s3: s3://ap-northeast-1/log-s3-phuoctd6
        s3forcepathstyle: true   # required for non-AWS S3-compatible endpoints; harmless on AWS

    # ── Retention — 1 day ─────────────────────────────────────────────────
    # compactor.retention_enabled must also be true (set below).
    limits_config:
      retention_period: 24h
      # Reject logs older than retention to avoid writing data that would be
      # immediately compacted away.
      reject_old_samples: true
      reject_old_samples_max_age: 24h
      # Ingestion rate limits — tune up if you see 429s
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
      # Per-stream label limits — high cardinality destroys Loki performance
      max_label_names_per_series: 30

    # ── Ingester ────────────────────────────────────────────────────────────
    ingester:
      chunk_idle_period: 30m
      chunk_block_size: 262144
      chunk_retain_period: 1m
      wal:
        dir: /var/loki/wal

    # ── Query performance ───────────────────────────────────────────────────
    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    # ── Server ─────────────────────────────────────────────────────────────
    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      log_level: info

# ---------------------------------------------------------------------------
# Shared S3 credentials env — referenced by every component via extraEnvFrom
# ---------------------------------------------------------------------------
# NOTE: loki-distributed chart does NOT have a top-level extraEnvFrom.
# Each component declares it individually below.

# ---------------------------------------------------------------------------
# Distributor
# Receives push requests from the OTel aggregator loki exporter.
# ---------------------------------------------------------------------------
distributor:
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 60

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  extraEnv:
    - name: AWS_REGION
      value: ap-northeast-1
  # extraEnvFrom:
  #   - secretRef:
  #       name: loki-s3-credentials   # provides AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY

# ---------------------------------------------------------------------------
# Ingester
# Buffers log chunks in memory with WAL, flushes completed chunks to S3.
# Must have replicas >= replication_factor (3).
# ---------------------------------------------------------------------------
ingester:
  replicas: 3

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  persistence:
    enabled: true
    storageClass: standard   # override via --set at deploy time using $STORAGE_CLASS
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  extraEnv:
    - name: AWS_REGION
      value: ap-northeast-1
  # extraEnvFrom:
  #   - secretRef:
  #       name: loki-s3-credentials

# ---------------------------------------------------------------------------
# Querier
# Fetches chunks from ingesters (recent) and S3 (older).
# ---------------------------------------------------------------------------
querier:
  replicas: 2

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  extraEnv:
    - name: AWS_REGION
      value: ap-northeast-1
  # extraEnvFrom:
  #   - secretRef:
  #       name: loki-s3-credentials

# ---------------------------------------------------------------------------
# Query Frontend
# Shards LogQL queries across queriers. Grafana connects here (port 3100).
# ---------------------------------------------------------------------------
queryFrontend:
  replicas: 2

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Query Scheduler (optional but recommended for distributed mode)
# Decouples the frontend from querier workers for better parallelism.
# ---------------------------------------------------------------------------
queryScheduler:
  enabled: true
  replicas: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Compactor
# Merges S3 chunks into larger blocks and enforces the 1-day retention policy.
# Must run as a single replica — compaction is not parallelisable.
# ---------------------------------------------------------------------------
compactor:
  enabled: true
  replicas: 1

  retention_enabled: true   # enables the retention_period from limits_config

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  extraEnv:
    - name: AWS_REGION
      value: ap-northeast-1
  # extraEnvFrom:
  #   - secretRef:
  #       name: loki-s3-credentials

  persistence:
    enabled: true
    storageClass: standard
    size: 5Gi
    accessModes:
      - ReadWriteOnce

# ---------------------------------------------------------------------------
# Index Gateway
# Caches tsdb index lookups — reduces S3 read traffic on repeated queries.
# ---------------------------------------------------------------------------
indexGateway:
  enabled: true
  replicas: 2

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

  extraEnv:
    - name: AWS_REGION
      value: ap-northeast-1
  # extraEnvFrom:
  #   - secretRef:
  #       name: loki-s3-credentials

  persistence:
    enabled: true
    storageClass: standard
    size: 1Gi
    accessModes:
      - ReadWriteOnce

# ---------------------------------------------------------------------------
# Gateway (nginx)
# Single ClusterIP entry point for both push (3100) and query (3100) paths.
# The OTel aggregator loki exporter points at this service.
# ---------------------------------------------------------------------------
gateway:
  enabled: true
  replicas: 2

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  service:
    type: ClusterIP
    port: 3100

# ---------------------------------------------------------------------------
# Memberlist — peer discovery for the ingester ring (no Consul/etcd needed)
# ---------------------------------------------------------------------------
memberlist:
  service:
    publishNotReadyAddresses: true

# ---------------------------------------------------------------------------
# ServiceMonitor — scraped by kube-prometheus-stack Prometheus
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  interval: 30s
  additionalLabels:
    release: kube-prometheus-stack