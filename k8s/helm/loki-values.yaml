loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    bucketNames:
      chunks: log-s3-phuoctd6          # ← change to your bucket name
      ruler: log-s3-phuoctd6            # ← change to your bucket name
      admin: log-s3-phuoctd6            # ← change to your bucket name (can be same)
    s3:
      endpoint: ""                 # leave empty for AWS S3
      region: ap-northeast-1       # ← change to your region
      s3ForcePathStyle: false      # set true for MinIO / path-style S3
      insecure: false   
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
  ruler:
    enable_api: true

minio:
  enabled: true
      
deploymentMode: Monolithic

singleBinary:
  replicas: 1

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomPlanner:
  replicas: 0
bloomBuilder:
  replicas: 0
bloomGateway:
  replicas: 0