# =============================================================================
# Loki 3.x Helm Values
# Mode:    Monolithic
# Storage: S3 / S3-compatible (MinIO)
# Auth:    Disabled (single tenant)
# OTLP:   Enabled (native ingestion)
# Chart:   grafana/loki >= 6.x (targets Loki 3.x image)
# =============================================================================

global:
  clusterDomain: cluster.local

# -----------------------------------------------------------------------------
# Deployment mode
# -----------------------------------------------------------------------------
deploymentMode: SingleBinary

singleBinary:
  replicas: 1                      # increase to 3+ for HA
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 1Gi
  persistence:
    enabled: false                 # using S3, no local PVC needed for data
                                   # WAL still uses emptyDir by default

# Disable all other component deployments (monolithic only)
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# -----------------------------------------------------------------------------
# Loki core configuration
# -----------------------------------------------------------------------------
loki:
  image:
    repository: grafana/loki
    tag: "3.5.0"                   # pin to latest stable 3.x

  auth_enabled: false              # single tenant

  # --- Common instance config --------------------------------------------------
  commonConfig:
    replication_factor: 1          # set to 3 if replicas > 1

  # --- Storage config ----------------------------------------------------------
  storage:
    type: s3
    bucketNames:
      chunks: log-s3-phuoctd6          # ← change to your bucket name
      ruler: log-s3-phuoctd6            # ← change to your bucket name
      admin: log-s3-phuoctd6            # ← change to your bucket name (can be same)
    s3:
      endpoint: ""                 # leave empty for AWS S3
      region: ap-northeast-1       # ← change to your region
      s3ForcePathStyle: false      # set true for MinIO / path-style S3
      insecure: false              # set true for MinIO without TLS

  # --- Schema config -----------------------------------------------------------
  # IMPORTANT: Loki 3.x requires tsdb index (v13+)
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  # --- Ingester ----------------------------------------------------------------
  ingester:
    chunk_idle_period: 2h
    chunk_retain_period: 1m
    max_chunk_age: 2h
    wal:
      enabled: true
      dir: /var/loki/wal

  # --- Querier -----------------------------------------------------------------
  querier:
    max_concurrent: 4

  # --- Query range -------------------------------------------------------------
  query_range:
    results_cache:
      cache:
        embedded_cache:
          enabled: true
          max_size_mb: 100

  # --- Compactor ---------------------------------------------------------------
  compactor:
    working_directory: /var/loki/compactor
    delete_request_store: s3
    retention_enabled: true

  # --- Limits (single tenant defaults) ----------------------------------------
  limits_config:
    # OTLP: required for structured metadata support
    allow_structured_metadata: true
    # Retention
    retention_period: 744h         # 31 days — adjust as needed
    # Ingestion
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    per_stream_rate_limit: 5MB
    per_stream_rate_limit_burst: 20MB
    max_streams_per_user: 10000
    max_line_size: 256kb
    # Query
    max_query_series: 5000
    max_query_parallelism: 8
    max_entries_limit_per_query: 50000

  # --- OTLP ingestion ----------------------------------------------------------
  # Enables native OTLP log ingestion via /otlp/v1/logs
  distributor:
    otlp_config:
      default_resource_attributes_as_index_labels:
        - service.name
        - service.namespace
        - k8s.namespace.name
        - k8s.pod.name
        - k8s.container.name
        - k8s.node.name
        - deployment.environment

  # --- Server ------------------------------------------------------------------
  server:
    http_listen_port: 3100
    grpc_listen_port: 9095
    log_level: info
    http_server_read_timeout: 600s
    http_server_write_timeout: 600s

  # --- Storage config (chunk / index cache) ------------------------------------
  chunk_store_config:
    chunk_cache_config:
      embedded_cache:
        enabled: true
        max_size_mb: 200

# -----------------------------------------------------------------------------
# Gateway (nginx)
# -----------------------------------------------------------------------------
gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 3100
  # Expose OTLP endpoint through gateway
  nginxConfig:
    httpSnippet: ""
    serverSnippet: ""
    # The default gateway config already proxies all /loki/* and /otlp/* paths

# -----------------------------------------------------------------------------
# Monitoring / self-monitoring (optional but recommended)
# -----------------------------------------------------------------------------
monitoring:
  selfMonitoring:
    enabled: false                 # set true if you have Grafana Agent / Alloy
  serviceMonitor:
    enabled: false                 # set true if you have Prometheus Operator
  lokiCanary:
    enabled: false

# -----------------------------------------------------------------------------
# Test (disable in production)
# -----------------------------------------------------------------------------
test:
  enabled: false

# -----------------------------------------------------------------------------
# ServiceAccount & RBAC
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  automountServiceAccountToken: true
  annotations: {}
    # For IRSA (AWS IAM Roles for Service Accounts), add:
    # eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>

# -----------------------------------------------------------------------------
# Extra env vars (alternative to inline credentials)
# Use this + a Kubernetes Secret instead of hardcoding keys above
# -----------------------------------------------------------------------------
singleBinary:
  replicas: 1
  persistence:
    enabled: false
  extraVolumes:
    - name: loki-wal
      emptyDir: {}
  extraVolumeMounts:
    - name: loki-wal
      mountPath: /var/loki/wal

# -----------------------------------------------------------------------------
# PodDisruptionBudget
# -----------------------------------------------------------------------------
podDisruptionBudget:
  enabled: false                   # enable if replicas > 1