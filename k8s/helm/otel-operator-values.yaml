# k8s/helm/otel-operator-values.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Values for: open-telemetry/opentelemetry-operator  (chart >= 0.64.2)
#
# Install:
#   helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
#   helm repo update
#   helm upgrade --install opentelemetry-operator open-telemetry/opentelemetry-operator \
#     --namespace observability \
#     --create-namespace \
#     --version 0.64.2 \
#     --values k8s/helm/otel-operator-values.yaml \
#     --wait
# ─────────────────────────────────────────────────────────────────────────────

# ── Manager / Operator ────────────────────────────────────────────────────────
manager:
  image:
    repository: ghcr.io/open-telemetry/opentelemetry-operator/opentelemetry-operator
    tag: ""    # uses Chart appVersion by default

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 64Mi

  # Leader election — keep true for HA; set false on single-node dev clusters.
  leaderElection:
    enabled: true

  # featureGates is a comma-separated STRING (not an array).
  # Example: "+operator.autoinstrumentation.go,+operator.autoinstrumentation.nginx"
  # Leave empty to use defaults (Python instrumentation works without any gates).
  # Note: from chart >= 0.72.1 prefer featureGatesMap over featureGates.
  featureGates: ""

# ── Admission webhook ─────────────────────────────────────────────────────────
admissionWebhooks:
  create: true
  # Ignore = pods still start even if the operator webhook is temporarily down.
  failurePolicy: Ignore

  certManager:
    # Set true if cert-manager is installed in the cluster (recommended for prod).
    enabled: false

  autoGenerateCert:
    enabled: true
    recreate: true

# ── CRD installation ──────────────────────────────────────────────────────────
crds:
  create: true

# ── kubeRBACProxy — secures the manager /metrics endpoint ─────────────────────
kubeRBACProxy:
  enabled: true
  image:
    repository: gcr.io/kubebuilder/kube-rbac-proxy
    tag: "v0.15.0"
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# ── Replica count ─────────────────────────────────────────────────────────────
replicaCount: 1

# ── Scheduling ────────────────────────────────────────────────────────────────
tolerations: []
affinity: {}
nodeSelector: {}