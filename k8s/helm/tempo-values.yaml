# k8s/helm/tempo-values.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Grafana Tempo — distributed mode on self-hosted K8S (EC2)
# Storage backend: AWS S3 with static IAM credentials
#
# Install:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   helm upgrade --install tempo grafana/tempo-distributed \
#     --namespace observability \
#     --values k8s/helm/tempo-values.yaml \
#     --wait
#
# Prerequisites:
#   1. S3 bucket created — set bucket name in two places below (marked TODO)
#   2. IAM user with S3 read/write created — credentials stored in:
#        Secret/tempo-s3-credentials  (created by charts/otel/templates/tempo-s3-secret.yaml)
#        keys: S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY
#   3. observability namespace exists (created by OTel operator step in deploy.sh)
#
# IAM policy required on the IAM user/role:
#   s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket on the bucket
# ─────────────────────────────────────────────────────────────────────────────

# ---------------------------------------------------------------------------
# Global
# ---------------------------------------------------------------------------
global:
  clusterDomain: cluster.local

# ---------------------------------------------------------------------------
# Service Account
# No IRSA annotation — credentials come from the Secret via envFrom.
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: tempo
  annotations: {}

# ---------------------------------------------------------------------------
# Storage — S3 backend with static credentials
#
# Credentials are NOT set here. They are injected as env vars from the
# Secret/tempo-s3-credentials into every component via extraEnvFrom below.
# Tempo reads AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY from the environment
# automatically — no extra SDK config needed.
# ---------------------------------------------------------------------------
storage:
  trace:
    backend: s3
    s3:
      bucket: tempo-s3-phuoctd6       # TODO: replace with your bucket name
      region: ap-northeast-1               # TODO: replace with your bucket region
      insecure: false                      # keep false — S3 always uses TLS
      endpoint: s3.ap-northeast-1.amazonaws.com

# ---------------------------------------------------------------------------
# Shared envFrom — injected into every component that touches S3.
# All five components (distributor, ingester, querier, compactor, and
# query-frontend) reference this same Secret so credentials are consistent.
# ---------------------------------------------------------------------------
# NOTE: tempo-distributed chart uses per-component extraEnvFrom — see each
# component block below. There is no global extraEnvFrom in this chart.

# ---------------------------------------------------------------------------
# Distributor
# Receives OTLP/gRPC from the OTel aggregator, hashes traces to ingesters.
# ---------------------------------------------------------------------------
distributor:
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 60

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"

# ---------------------------------------------------------------------------
# Ingester
# Buffers spans in memory, flushes completed trace blocks to S3.
# WAL PVC survives pod restarts without data loss.
# ---------------------------------------------------------------------------
ingester:
  replicas: 2   # must not be lower than replication_factor 

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  persistence:
    enabled: true
    storageClass: standard   # self-hosted K8S — use your provisioner (e.g. local-path, nfs)
    size: 2Gi
    accessModes:
      - ReadWriteOnce

  extraEnv:
    - name: AWS_REGION
      value: ap-northeast-1
  extraEnvFrom:
    - secretRef:
        name: tempo-s3-credentials

  config:
    replication_factor: 2

# ---------------------------------------------------------------------------
# Querier
# Fetches traces from ingesters (recent) and S3 (older).
# ---------------------------------------------------------------------------
querier:
  replicas: 2

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  extraEnv:
    - name: AWS_REGION
      value: ap-northeast-1
  extraEnvFrom:
    - secretRef:
        name: tempo-s3-credentials

# ---------------------------------------------------------------------------
# Query Frontend
# Shards search queries across queriers. Grafana connects here.
# Does not touch S3 directly but gets the Secret for consistency.
# ---------------------------------------------------------------------------
queryFrontend:
  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  service:
    type: ClusterIP
    port: 3200
    grpc:
      port: 9095

# ---------------------------------------------------------------------------
# Compactor
# Merges small S3 blocks into larger ones, enforces retention.
# ---------------------------------------------------------------------------
compactor:
  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  extraEnv:
    - name: AWS_REGION
      value: ap-northeast-1
  extraEnvFrom:
    - secretRef:
        name: tempo-s3-credentials

  config:
    compaction:
      block_retention: 24h   # 14 days — reduce if S3 costs are a concern

# ---------------------------------------------------------------------------
# Memcached — query-path cache
# Reduces S3 GET calls for recently-queried trace blocks.
# ---------------------------------------------------------------------------
memcached:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Tempo structured config overrides
# ---------------------------------------------------------------------------
tempo:
  structuredConfig:
    ingester:
      lifecycler:
        ring:
          replication_factor: 2

    querier:
      frontend_worker:
        frontend_address: "tempo-query-frontend:9095"

    storage:
      trace:
        backend: s3
        s3:
          bucket: tempo-s3-phuoctd6   # TODO: must match storage.trace.s3.bucket above
          region: ap-northeast-1
          endpoint: s3.ap-northeast-1.amazonaws.com
          # Credentials come from env vars — do not set access_key / secret_key here.
          # The AWS SDK automatically reads AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY.
          insecure: false
        blocklist_poll: 5m

    server:
      http_listen_port: 3200
      grpc_listen_port: 9095
      log_level: info

# ---------------------------------------------------------------------------
# ServiceMonitor — scraped by kube-prometheus-stack Prometheus
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  interval: 30s
  additionalLabels:
    release: kube-prometheus-stack