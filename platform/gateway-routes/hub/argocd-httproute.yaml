# Replaces platform/values/hub/argocd.yaml -> server.ingress. That block
# should be deleted from that values file (or at least ingress.enabled: false
# set) now that this HTTPRoute owns routing.
#
# server.insecure: true in platform/values/hub/argocd.yaml means ArgoCD
# serves plain HTTP internally — same assumption ingress-nginx made
# (backend-protocol: HTTP), so this backendRef targets the plain http port.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  parentRefs:
    - name: hub-gateway
      namespace: gateway-system
      sectionName: argocd-https
  hostnames:
    - argocd.phuoctd6.shop
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
