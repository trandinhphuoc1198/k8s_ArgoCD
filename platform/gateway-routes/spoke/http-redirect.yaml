# Catch-all HTTP -> HTTPS redirect, replacing ingress-nginx's
# nginx.ingress.kubernetes.io/ssl-redirect: "true" annotation. Attaches to
# the plain "http" listener on spoke-gateway; matches every hostname since
# it has no `hostnames:` restriction.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
  namespace: gateway-system
spec:
  parentRefs:
    - name: spoke-gateway
      namespace: gateway-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
