# Replaces the hubble.ui.ingress Ingress that used to come from
# platform/values/spoke/cilium.yaml (now disabled in
# platform/values/base/cilium.yaml -> hubble.ui.ingress.enabled: false).
#
# Service name/port: VERIFY — Cilium's chart creates "hubble-ui" in
# kube-system on port 80 by default.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-ui
  namespace: kube-system
spec:
  parentRefs:
    - name: spoke-gateway
      namespace: gateway-system
      sectionName: hubble-https
  hostnames:
    - hubble.phuoctd6.shop
  rules:
    - backendRefs:
        - name: hubble-ui
          port: 80
