apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-pods-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  pods-overview.json: |-
    {
      "title": "Pods Overview (Status + Logs)",
      "uid": "pods-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "tags": ["kubernetes", "pods", "logs", "loki", "overview"],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(kube_pod_info, namespace)",
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Namespace"
          },
          {
            "name": "pod",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(kube_pod_info{namespace=~\"$namespace\"}, pod)",
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Pod"
          },
          {
            "name": "container",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(kube_pod_container_info{namespace=~\"$namespace\", pod=~\"$pod\"}, container)",
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Container"
          },
          {
            "name": "severity",
            "type": "custom",
            "query": "All : .*,DEBUG : DEBUG,INFO : INFO,WARN : WARN,ERROR : ERROR,FATAL : FATAL",
            "current": { "text": "All", "value": ".*" },
            "label": "Severity"
          },
          {
            "name": "search",
            "type": "textbox",
            "query": "",
            "current": { "text": "", "value": "" },
            "label": "Log search (regex)"
          }
        ]
      },
      "panels": [

        { "id": 1, "title": "Total Pods", "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue" }] } } },
          "targets": [{ "expr": "count(kube_pod_info{namespace=~\"$namespace\", pod=~\"$pod\"})", "legendFormat": "" }]
        },
        { "id": 2, "title": "Running", "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green" }] } } },
          "targets": [{ "expr": "sum(kube_pod_status_phase{namespace=~\"$namespace\", pod=~\"$pod\", phase=\"Running\"}) or vector(0)", "legendFormat": "" }]
        },
        { "id": 3, "title": "Pending", "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green" }, { "color": "yellow", "value": 1 }] } } },
          "targets": [{ "expr": "sum(kube_pod_status_phase{namespace=~\"$namespace\", pod=~\"$pod\", phase=\"Pending\"}) or vector(0)", "legendFormat": "" }]
        },
        { "id": 4, "title": "Failed", "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green" }, { "color": "red", "value": 1 }] } } },
          "targets": [{ "expr": "sum(kube_pod_status_phase{namespace=~\"$namespace\", pod=~\"$pod\", phase=\"Failed\"}) or vector(0)", "legendFormat": "" }]
        },
        { "id": 5, "title": "CrashLooping", "type": "stat",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green" }, { "color": "red", "value": 1 }] } } },
          "targets": [{ "expr": "count(kube_pod_container_status_waiting_reason{namespace=~\"$namespace\", pod=~\"$pod\", reason=\"CrashLoopBackOff\"}) or vector(0)", "legendFormat": "" }]
        },
        { "id": 6, "title": "Restarts (30m)", "type": "stat",
          "gridPos": { "x": 20, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green" }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] } } },
          "targets": [{ "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\", pod=~\"$pod\"}[30m])) or vector(0)", "legendFormat": "" }]
        },

        { "id": 7, "title": "Pod Status (click a row to filter the logs below)", "type": "table",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "format": "table", "instant": true, "range": false,
              "expr": "label_join(kube_pod_status_phase{namespace=~\"$namespace\", pod=~\"$pod\"} == 1, \"nspod\", \"/\", \"namespace\", \"pod\")" },
            { "refId": "B", "format": "table", "instant": true, "range": false,
              "expr": "label_join(sum by (namespace, pod) (kube_pod_container_status_ready{namespace=~\"$namespace\", pod=~\"$pod\"}), \"nspod\", \"/\", \"namespace\", \"pod\")" },
            { "refId": "C", "format": "table", "instant": true, "range": false,
              "expr": "label_join(sum by (namespace, pod) (kube_pod_container_status_restarts_total{namespace=~\"$namespace\", pod=~\"$pod\"}), \"nspod\", \"/\", \"namespace\", \"pod\")" },
            { "refId": "D", "format": "table", "instant": true, "range": false,
              "expr": "label_join(time() - max by (namespace, pod) (kube_pod_start_time{namespace=~\"$namespace\", pod=~\"$pod\"}), \"nspod\", \"/\", \"namespace\", \"pod\")" },
            { "refId": "E", "format": "table", "instant": true, "range": false,
              "expr": "label_join(max by (namespace, pod, node) (kube_pod_info{namespace=~\"$namespace\", pod=~\"$pod\"}), \"nspod\", \"/\", \"namespace\", \"pod\")" }
          ],
          "transformations": [
            { "id": "joinByField", "options": { "byField": "nspod", "mode": "outer" } },
            { "id": "organize", "options": {
                "excludeByName": {
                  "nspod": true,
                  "Time #A": true, "Time #B": true, "Time #C": true, "Time #D": true, "Time #E": true,
                  "Value #A": true, "Value #E": true,
                  "namespace #B": true, "pod #B": true,
                  "namespace #C": true, "pod #C": true,
                  "namespace #D": true, "pod #D": true,
                  "namespace #E": true, "pod #E": true
                },
                "renameByName": {
                  "namespace #A": "Namespace",
                  "pod #A": "Pod",
                  "phase": "Status",
                  "Value #B": "Ready",
                  "Value #C": "Restarts",
                  "Value #D": "Age (s)",
                  "node": "Node"
                },
                "indexByName": {
                  "Namespace": 0, "Pod": 1, "Status": 2, "Ready": 3, "Restarts": 4, "Age (s)": 5, "Node": 6
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": { "custom": { "filterable": true } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Status" },
                "properties": [
                  { "id": "mappings", "value": [
                    { "type": "value", "options": {
                      "Running":   { "color": "green",  "index": 0 },
                      "Succeeded": { "color": "blue",   "index": 1 },
                      "Pending":   { "color": "orange", "index": 2 },
                      "Failed":    { "color": "red",    "index": 3 },
                      "Unknown":   { "color": "gray",   "index": 4 }
                    } }
                  ] },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              },
              { "matcher": { "id": "byName", "options": "Restarts" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-background" },
                  { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] } }
                ]
              },
              { "matcher": { "id": "byName", "options": "Age (s)" },
                "properties": [ { "id": "unit", "value": "s" } ]
              },
              { "matcher": { "id": "byName", "options": "Pod" },
                "properties": [
                  { "id": "links", "value": [
                    { "title": "Filter logs to this pod", "url": "/d/${__dashboard.uid}/${__dashboard.slug}?${__url_time_range}&var-namespace=${__data.fields.Namespace}&var-pod=${__data.fields.Pod}", "targetBlank": false }
                  ] }
                ]
              },
              { "matcher": { "id": "byName", "options": "Namespace" },
                "properties": [
                  { "id": "links", "value": [
                    { "title": "Filter to this namespace", "url": "/d/${__dashboard.uid}/${__dashboard.slug}?${__url_time_range}&var-namespace=${__data.fields.Namespace}&var-pod=All", "targetBlank": false }
                  ] }
                ]
              }
            ]
          }
        },

        { "id": 8, "title": "Error/Fatal Logs (15m)", "type": "stat",
          "gridPos": { "x": 0, "y": 14, "w": 4, "h": 6 },
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green" }, { "color": "red", "value": 1 }] } } },
          "targets": [
            { "refId": "A", "instant": true, "range": false,
              "expr": "sum(count_over_time({k8s_namespace_name=~\"$namespace\", k8s_pod_name=~\"$pod\", k8s_container_name=~\"$container\"} | severity_text=~\"ERROR|FATAL\" [15m])) or vector(0)" }
          ]
        },
        { "id": 9, "title": "Log Volume by Namespace", "type": "timeseries",
          "gridPos": { "x": 4, "y": 14, "w": 20, "h": 6 },
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 1, "fillOpacity": 10, "drawStyle": "bars" } } },
          "targets": [
            { "refId": "A", "instant": false, "range": true,
              "expr": "sum by (k8s_namespace_name) (count_over_time({k8s_namespace_name=~\"$namespace\", k8s_pod_name=~\"$pod\", k8s_container_name=~\"$container\"}[$__interval]))",
              "legendFormat": "{{k8s_namespace_name}}" }
          ]
        },

        { "id": 10, "title": "Pod Logs", "type": "logs",
          "gridPos": { "x": 0, "y": 20, "w": 24, "h": 14 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          },
          "targets": [
            { "refId": "A",
              "expr": "{k8s_namespace_name=~\"$namespace\", k8s_pod_name=~\"$pod\", k8s_container_name=~\"$container\"} | severity_text=~\"$severity\" |~ \"$search\"" }
          ]
        }

      ]
    }
