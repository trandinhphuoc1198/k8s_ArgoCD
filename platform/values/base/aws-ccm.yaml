# platform/values/base/aws-ccm.yaml
#
# Shared across every deployment tier. Consumed by BOTH:
#   - argocd/hub/00-aws-ccm.yaml            (hub)
#   - argocd/spokes/infra/00-aws-ccm.yaml   (every spoke)
#
# Every value CCM needs is currently identical between hub and spoke — the
# tier files (platform/values/hub/aws-ccm.yaml,
# platform/values/spoke/aws-ccm.yaml) are empty {} today. If hub and spoke
# ever need to diverge (different region, different node labels), add keys
# to the relevant tier file — do not special-case a tier here.

args:
  - --v=2
  - --cloud-provider=aws
  - --configure-cloud-routes=false

image:
  repository: registry.k8s.io/provider-aws/cloud-controller-manager

imagePullSecrets: []

nameOverride: "aws-cloud-controller-manager"

nodeSelector:
  node-role.kubernetes.io/control-plane: ""

tolerations:
  - key: node.cloudprovider.kubernetes.io/uninitialized
    value: "true"
    effect: NoSchedule
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

dnsPolicy: Default

hostNetworking: true

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

priorityClassName: system-cluster-critical

serviceAccount:
  create: true
  name: aws-cloud-controller-manager
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]