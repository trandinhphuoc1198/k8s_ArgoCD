# Shared across every deployment tier. Consumed by BOTH:
#   - argocd/hub/00-aws-ccm.yaml            (hub)
#   - argocd/spokes/infra/00-aws-ccm.yaml   (every spoke)
#
# Every value CCM needs is currently identical between hub and spoke — the
# tier files (platform/values/hub/aws-ccm.yaml,
# platform/values/spoke/aws-ccm.yaml) are empty {} today. If hub and spoke
# ever need to diverge (different region, different node labels), add keys
# to the relevant tier file — do not special-case a tier here.

args:
  - --v=6
  - --cloud-provider=aws
  # Native routing (see platform/values/base/cilium.yaml) needs AWS VPC
  # route tables kept in sync with each node's pod CIDR — this is exactly
  # what CCM's route controller does (watches node.spec.podCIDR, creates/
  # deletes the matching VPC route). It discovers the target route table
  # via the kubernetes.io/cluster/<cluster-name> tag applied in
  # modules/vpc, and needs ec2:CreateRoute/DeleteRoute on top of the
  # DescribeRouteTables permission master_ccm_policy already has — see
  # modules/ec2/main.tf.
  - --configure-cloud-routes=true
  # Required for the route controller to start; must match pod_cidr in
  # every live/*/envs/*/terraform.tfvars.
  - --cluster-cidr=192.168.0.0/16

image:
  repository: docker.io/gintaku98/aws-cloud-controller-manager
  tag: v1.36.1

imagePullSecrets: []

nameOverride: "aws-cloud-controller-manager"

nodeSelector:
  node-role.kubernetes.io/control-plane: ""

tolerations:
  - key: node.cloudprovider.kubernetes.io/uninitialized
    value: "true"
    effect: NoSchedule
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

dnsPolicy: Default

hostNetworking: true

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

priorityClassName: system-cluster-critical

serviceAccount:
  create: true
  name: aws-cloud-controller-manager
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]