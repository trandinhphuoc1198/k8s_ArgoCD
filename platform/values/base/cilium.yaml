# Shared across every deployment tier. Consumed by BOTH:
#   - argocd/hub/00-cilium.yaml            (hub)
#   - argocd/spokes/infra/00-cilium.yaml   (every spoke)
#
# Everything here is intentionally identical regardless of which cluster
# Cilium runs on: routing mode, kube-proxy replacement, masquerade,
# encryption, Hubble feature toggles, Gateway API, resource sizing,
# tolerations.
#
# Only truly per-cluster values live in the tier overlay:
#   - k8sServiceHost / k8sServicePort  (that cluster's own API server)
#   - hubble.ui.ingress.hosts          (avoids a DNS collision between tiers)
#
# Each tier layers platform/values/<tier>/cilium.yaml on top of this file
# via a second helm.valueFiles entry, tier file last so it wins.

# ── Routing ────────────────────────────────────────────────────────────────
# Native routing (no VXLAN encapsulation) instead of the previous
# routingMode: tunnel. Nodes are not L2-adjacent (each cluster spans 2
# private subnets/AZs), so pod-to-pod traffic across AZs relies entirely on
# AWS VPC route tables, not direct netlink routes between nodes — hence
# autoDirectNodeRoutes: false below. Those VPC routes are synced by AWS
# Cloud Controller Manager's route controller (platform/values/base/aws-ccm.yaml,
# --configure-cloud-routes=true), not by Cilium itself. CCM watches
# node.spec.podCIDR (assigned by kube-controller-manager under
# ipam.mode: kubernetes) and creates/removes the matching VPC route
# automatically, including on node replacement — see modules/ec2's
# master_ccm_policy for the IAM this needs and modules/vpc for the
# kubernetes.io/cluster/<name> tag CCM discovers the route table by.
routingMode: native

# Must match pod_cidr in every live/*/envs/*/terraform.tfvars. Tells
# Cilium which destination IPs are "in-cluster" (route natively, never
# masquerade) vs external (masquerade via bpf.masquerade below).
ipv4NativeRoutingCIDR: "192.168.0.0/16"

ipam:
  mode: kubernetes

# false: nodes are spread across multiple AZs/subnets, so direct
# node-to-node netlink routes (which only work for L2-adjacent nodes)
# don't apply here. Leaving this true would have Cilium's own node-route
# reconciler fight the cloud-managed routes from AWS CCM.
autoDirectNodeRoutes: false

kubeProxyReplacement: "true"

nodePort:
  enabled: true
  range: "30000,32767"

bpf:
  masquerade: true

enableIPv4Masquerade: true
enableIPv6Masquerade: false

# ── Gateway API ────────────────────────────────────────────────────────────
# Replaces ingress-nginx cluster-wide (see platform/gateway-api/ and
# platform/gateway-routes/). Implemented by Cilium's embedded Envoy
# (L7 proxy), so l7Proxy must stay true.
#
# Requires the Gateway API CRDs to already exist when the Cilium agent
# starts — installed one sync-wave earlier by
# argocd/{hub,spokes/infra}/00-gateway-api-crds.yaml (wave "-1" vs Cilium's
# "00"). If Cilium ever syncs before the CRDs land (e.g. a future
# hard-reset bootstrap), the gateway-api controller just logs and retries
# until the CRDs appear — it does not crash the agent.
#
# Cilium auto-creates a GatewayClass named "cilium" when this is enabled;
# no manual GatewayClass manifest is needed anywhere in this repo.
l7Proxy: true
gatewayAPI:
  enabled: true
  enableAlpn: true
  enableProxyProtocol: false

hubble:
  enabled: true
  metrics:
    enabled:
      - dns:query;ignoreAAAA
      - drop
      - tcp
      - flow
      - icmp
      - http
    serviceMonitor:
      enabled: false
      trustCRDsExist: true
    
    # ── Persistent flow export ──────────────────────────────────────────────
    export:
    fileMaxSizeMb: 10
    fileMaxBackups: 5
    static:
      enabled: true
      filePath: /var/run/cilium/hubble/events.log
      allowList:
        - '{"verdict":["DROPPED","ERROR"]}'
        - '{"verdict":["FORWARDED"], "event_type":[{"type":128}]}'

  relay:
    enabled: true
    rollOutPods: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  ui:
    enabled: true
    rollOutPods: true
    # No more ingress-nginx Ingress — Hubble UI is now exposed via a
    # Gateway API HTTPRoute (platform/gateway-routes/hub/hubble-httproute.yaml,
    # platform/gateway-routes/spoke/hubble-httproute.yaml) pointing at the
    # hubble-ui Service this chart still creates. Hostnames/TLS now live on
    # the shared Gateway listeners (platform/gateway-api/), not here.
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

prometheus:
  enabled: true
  serviceMonitor:
    enabled: false
    trustCRDsExist: true

operator:
  replicas: 1
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Must run on control-plane node too — Cilium bootstraps the CNI before
# the control-plane taint is applied, on both hub and spoke.
tolerations:
  - operator: Exists

rollOutCiliumPods: true

identityAllocationMode: crd

encryption:
  enabled: true
  type: wireguard
