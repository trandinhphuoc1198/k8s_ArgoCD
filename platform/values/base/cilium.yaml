# platform/values/base/cilium.yaml
#
# Shared across every deployment tier. Consumed by BOTH:
#   - argocd/hub/00-cilium.yaml            (hub)
#   - argocd/spokes/infra/00-cilium.yaml   (every spoke)
#
# Everything here is intentionally identical regardless of which cluster
# Cilium runs on: routing mode, kube-proxy replacement, masquerade,
# encryption, Hubble feature toggles, resource sizing, tolerations.
#
# Only truly per-cluster values live in the tier overlay:
#   - k8sServiceHost / k8sServicePort  (that cluster's own API server)
#   - hubble.ui.ingress.hosts          (avoids a DNS collision between tiers)
#
# Each tier layers platform/values/<tier>/cilium.yaml on top of this file
# via a second helm.valueFiles entry, tier file last so it wins.

routingMode: tunnel

ipam:
  mode: kubernetes

kubeProxyReplacement: "true"

nodePort:
  enabled: true
  range: "30000,32767"

bpf:
  masquerade: true

enableIPv4Masquerade: true
enableIPv6Masquerade: false

hubble:
  enabled: true
  metrics:
    enabled:
      - dns:query;ignoreAAAA
      - drop
      - tcp
      - flow
      - icmp
      - http
    serviceMonitor:
      enabled: false
      trustCRDsExist: true

  relay:
    enabled: true
    rollOutPods: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  ui:
    enabled: true
    rollOutPods: true
    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        cert-manager.io/cluster-issuer: "internal-ca-issuer"
      # hosts/tls set per-tier — see hub/cilium.yaml, spoke/cilium.yaml
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

prometheus:
  enabled: true
  serviceMonitor:
    enabled: false
    trustCRDsExist: true

operator:
  replicas: 1
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Must run on control-plane node too — Cilium bootstraps the CNI before
# the control-plane taint is applied, on both hub and spoke.
tolerations:
  - operator: Exists

rollOutCiliumPods: true

identityAllocationMode: crd

encryption:
  enabled: true
  type: wireguard