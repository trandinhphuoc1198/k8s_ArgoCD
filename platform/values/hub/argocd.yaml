# platform/values/hub/argocd.yaml
# Hub-only. Consumed exclusively by argocd/hub/00-argocd.yaml and init.sh.
# Never referenced by any spoke ApplicationSet — ArgoCD itself only ever
# runs on the hub.
#
# Values for the official Argo CD Helm chart (argoproj/argo-helm).
# This installs Argo CD itself — it is NOT managed by Argo CD (chicken-and-egg),
# so it's applied once by hand via init.sh / argocd/hub/00-argocd.yaml, same
# way Cilium is bootstrapped by cloud-init before deploy.sh ever runs.
#
# Install:
#   helm repo add argo https://argoproj.github.io/argo-helm
#   helm repo update
#   helm upgrade --install argocd argo/argo-cd \
#     --namespace argocd --create-namespace \
#     --values platform/values/hub/argocd.yaml \
#     --wait

# ── Global Configuration ──────────────────────────────────────────────────────
global:
  # Setting the global domain configures the ArgoCD URL across all components automatically
  domain: argocd.phuoctd6.shop
  
  # This applies the rule to all pods generated by the ArgoCD Helm Chart
  # topologySpreadConstraints:
  #   - maxSkew: 2
  #     topologyKey: "kubernetes.io/hostname"
  #     whenUnsatisfiable: DoNotSchedule  # Hard rule: Pod will remain 'Pending' if it violates the max limit
  #     labelSelector:
  #       matchExpressions:
  #         - key: app.kubernetes.io/part-of
  #           operator: In
  #           values:
  #             - argocd

# ── Server exposure ───────────────────────────────────────────────────────────
configs:
  params:
    # Keep server.insecure: true because TLS is terminated at your Nginx Ingress.
    # This prevents redundant double-encryption overhead between Ingress and the backend pod.
    server.insecure: true

server:
  ingress:
    enabled: true
    hostname: "argocd.phuoctd6.shop"
    ingressClassName: nginx
    path: /
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      # Tells Nginx to talk to the backend over plain HTTP (since server.insecure is true)
      # nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      cert-manager.io/cluster-issuer: "internal-ca-issuer"
    
    # Enabling this causes the chart to automatically generate the TLS block 
    # using the default secret name: argocd-server-tls
    tls: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 400m
      memory: 1Gi

controller:
  resources:
    requests:
      cpu: 300m
      memory: 1229Mi
    limits:
      cpu: 1000m
      memory: 2Gi

applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Not needed for a single-cluster, no-SSO setup. Flip on later if you want
# GitHub/OIDC login instead of the built-in admin user.
dex:
  enabled: false

notifications:
  enabled: false
