# platform/values/hub/cilium.yaml
#
# Hub-tier overlay, layered on top of platform/values/base/cilium.yaml by
# argocd/hub/00-cilium.yaml. Cilium on the hub is installed by Terraform
# (not this repo) — this file is what ArgoCD adopts against on takeover.
# Before enabling automated sync, diff `helm get values cilium -n
# kube-system` on the live hub against base + this file merged.
#
# TODO: replace with the hub's own control-plane private IP — this is NOT
# the spoke's value (10.0.1.10). Check what Terraform passed as
# k8sServiceHost when it installed Cilium on the hub.
k8sServiceHost: "10.0.11.10"
k8sServicePort: "6443"

# Hubble UI's hostname now lives on the hub Gateway
# (platform/gateway-api/hub-gateway.yaml, listener "hubble-https",
# hostname hubble-hub.phuoctd6.shop) instead of here — base/cilium.yaml
# turns hubble.ui.ingress off entirely now that ingress-nginx is gone.
