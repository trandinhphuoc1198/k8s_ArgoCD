# platform/values/hub/ingress-nginx.yaml
#
# Hub-tier override, layered on top of platform/values/base/ingress-nginx.yaml
# by argocd/hub/02-ingress-nginx.yaml. Metrics/ServiceMonitor are tier-owned
# rather than base-owned since a tier might reasonably run without its own
# Prometheus scraping it (e.g. a hub with no kube-prometheus-stack) —
# currently on, matching spoke.
controller:
  metrics:
    enabled: false
    serviceMonitor:
      enabled: false
