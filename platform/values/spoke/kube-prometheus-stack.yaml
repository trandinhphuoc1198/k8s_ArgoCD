grafana:
  adminPassword: kagura12
  deploymentStrategy:
    type: Recreate

  # env:
  #   GF_SERVER_ROOT_URL: http://aa-123124710.ap-northeast-1.elb.amazonaws.com/grafana/
  #   GF_SERVER_SERVE_FROM_SUB_PATH: "true"

  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClassName: ebs-csi

  service:
    type: ClusterIP

  # Ingress replaced by platform/gateway-routes/spoke/grafana-httproute.yaml
  # (Gateway API, via the shared spoke-gateway). Left explicitly disabled
  # here so a future `helm upgrade` can't silently re-enable ingress-nginx
  # routing alongside it.
  ingress:
    enabled: false

  resources:
    requests:
      cpu: 300m
      memory: 500Mi
    limits:
      cpu: 600m
      memory: 700Mi

prometheus:
  prometheusSpec:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus
    retention: 2d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: ebs-csi
          resources:
            requests:
              storage: 1Gi

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 300m
        memory: 800Mi

  # Ingress replaced by platform/gateway-routes/spoke/prometheus-httproute.yaml
  ingress:
    enabled: false

alertmanager:
  # Ingress replaced by platform/gateway-routes/spoke/alertmanager-httproute.yaml
  ingress:
    enabled: false

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheus-node-exporter:
  priorityClassName: system-node-critical
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
