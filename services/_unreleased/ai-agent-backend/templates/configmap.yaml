apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-agent-backend.fullname" . }}-config
  labels:
    {{- include "ai-agent-backend.labels" . | nindent 4 }}
data:
  MODEL: {{ .Values.config.model | quote }}
  CMD_MODE: {{ .Values.config.cmdMode | quote }}
  WORKSPACE_DIR: {{ .Values.config.workspaceDir | quote }}
  LOGS_DIR: {{ .Values.config.logsDir | quote }}
  RAG_SCORE_THRESHOLD: {{ .Values.config.ragScoreThreshold | quote }}
  TOOLS_ENABLED: {{ .Values.config.toolsEnabled | quote }}
  ENABLED_TOOLS: {{ .Values.config.enabledTools | quote }}
  history_recent_turns: {{ .Values.config.historyRecentTurns | quote }}
  history_max_turns: {{ .Values.config.historyMaxTurns | quote }}
