{{- if and .Values.database.createSecret (not .Values.database.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-agent-backend.databaseSecretName" . }}
  labels:
    {{- include "ai-agent-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_WRITER_HOST: {{ .Values.database.writehost | quote }}
  DB_READER_HOST: {{ .Values.database.readhost | quote }}
  DB_PORT: {{ .Values.database.port | quote }}
  DB_USER: {{ .Values.database.user | quote }}
  DB_PASSWORD: {{ .Values.database.password | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
{{- end }}